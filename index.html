<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0e0e10">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>LAB.STUDIO — Gestão Criativa</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&family=JetBrains+Mono:wght@400;500;600&family=Syne:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-app.js";
import { getFirestore, collection, doc, setDoc, deleteDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-firestore.js";
import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyCdxx2EMbsfMVbaL6J9LKN3paFfmESeY6o",
  authDomain: "lab-studio-626f8.firebaseapp.com",
  projectId: "lab-studio-626f8",
  storageBucket: "lab-studio-626f8.firebasestorage.app",
  messagingSenderId: "100658301742",
  appId: "1:100658301742:web:1dfaa150a468b0232cc8bf"
};

const app      = initializeApp(firebaseConfig);
const db       = getFirestore(app);
const auth     = getAuth(app);
const provider = new GoogleAuthProvider();

let unsubTrabalhos = null;
let unsubClientes  = null;
let unsubPrecos    = null;

function userCol(colName) {
  return collection(db, 'usuarios', window._uid, colName);
}
function userDoc(colName, id) {
  return doc(db, 'usuarios', window._uid, colName, id);
}

window._db        = db;
window._auth      = auth;
window._signOut   = () => signOut(auth);
window._setDoc    = setDoc;
window._deleteDoc = deleteDoc;
window._userDoc   = userDoc;

window.fazerLogin = async () => {
  try {
    await signInWithPopup(auth, provider);
  } catch(e) {
    document.getElementById('login-error').textContent = 'Erro ao fazer login. Tente novamente.';
  }
};

onAuthStateChanged(auth, user => {
  if (unsubTrabalhos) { unsubTrabalhos(); unsubTrabalhos = null; }
  if (unsubClientes)  { unsubClientes();  unsubClientes  = null; }
  if (unsubPrecos)    { unsubPrecos();    unsubPrecos    = null; }
  window._appReady = false;

  if (user) {
    window._uid = user.uid;
    document.getElementById('tela-login').style.display = 'none';
    document.getElementById('app-root').style.display   = 'block';
    document.getElementById('sync-status').textContent  = '🟢 ' + (user.displayName || user.email);
    document.getElementById('sync-status').style.color  = 'var(--green)';
    document.getElementById('btn-logout').style.display = 'flex';

    unsubTrabalhos = onSnapshot(userCol('trabalhos'), snap => {
      window.trabalhos = [];
      snap.forEach(d => window.trabalhos.push(d.data()));
      window.trabalhos.sort((a,b) => (b.criadoEm||0) - (a.criadoEm||0));
      if (window._appReady) { window.renderDashboard(); window.renderTrabalhos(); window.updateBadges(); }
    });

    unsubClientes = onSnapshot(userCol('clientes'), snap => {
      window.clientes = [];
      snap.forEach(d => window.clientes.push(d.data()));
      if (window._appReady) { window.renderDashboard(); window.renderClientes(); window.updateBadges(); }
    });

    unsubPrecos = onSnapshot(userCol('precos'), snap => {
      window.precos = [];
      snap.forEach(d => window.precos.push(d.data()));
      window.precos.sort((a,b) => a.nome.localeCompare(b.nome));
      if (window._appReady) { window.renderPrecos(); window.updateBadges(); window.atualizarSeletorPrecos(); }
    });

    window._appReady = true;
    window.renderDashboard();
    window.updateBadges();
  } else {
    window._uid = null;
    window.trabalhos = [];
    window.clientes  = [];
    window.precos    = [];
    document.getElementById('tela-login').style.display = 'flex';
    document.getElementById('app-root').style.display   = 'none';
    document.getElementById('btn-logout').style.display = 'none';
  }
});
</script>
<style>
  * { margin:0; padding:0; box-sizing: border-box; }
  :root {
    --bg: #0e0e10;
    --surface: #17171b;
    --surface2: #1e1e24;
    --border: #2a2a35;
    --accent-analog: #f4a134;
    --accent-digital: #3b9eff;
    --accent-analog-dim: rgba(244,161,52,0.12);
    --accent-digital-dim: rgba(59,158,255,0.12);
    --text: #e8e8f0;
    --text-muted: #6b6b80;
    --text-dim: #9898b0;
    --green: #4ade80;
    --red: #f87171;
    --radius: 12px;
    --radius-sm: 8px;
  }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image: linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px),
                      linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }
  header {
    position: sticky; top: 0; z-index: 100;
    background: rgba(14,14,16,0.85);
    backdrop-filter: blur(16px);
    border-bottom: 1px solid var(--border);
    padding: 0 32px;
    display: flex; align-items: center; justify-content: space-between;
    height: 60px;
  }
  .logo {
    font-family: 'Syne', sans-serif;
    font-size: 18px; font-weight: 800; letter-spacing: 0.12em;
    display: flex; align-items: center; gap: 10px;
  }
  .logo span { color: var(--accent-analog); }
  .logo-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--accent-analog);
    box-shadow: 0 0 10px var(--accent-analog);
    animation: pulse 2s infinite;
  }
  @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:.3; } }
  .header-right { display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
  .btn-backup {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text-dim);
    padding: 7px 14px;
    border-radius: var(--radius-sm);
    font-family: 'Inter', sans-serif;
    font-weight: 600;
    font-size: 12px;
    cursor: pointer;
    transition: all .2s;
    display: inline-flex; align-items: center; gap: 5px;
  }
  .btn-backup:hover { border-color: var(--text-muted); color: var(--text); background: var(--surface); }
  .btn-backup.importar { color: var(--accent-digital); border-color: rgba(59,158,255,0.3); }
  .btn-backup.importar:hover { background: var(--accent-digital-dim); border-color: var(--accent-digital); }
  .btn-add {
    background: var(--accent-analog);
    color: #000;
    border: none;
    padding: 8px 18px;
    border-radius: var(--radius-sm);
    font-family: 'Inter', sans-serif;
    font-weight: 700;
    font-size: 13px;
    cursor: pointer;
    transition: all .2s;
    display: inline-flex; align-items: center; gap: 6px;
  }
  .btn-add:hover { opacity: .85; transform: translateY(-1px); }
  nav {
    display: flex; gap: 4px;
    padding: 16px 32px 0;
    border-bottom: 1px solid var(--border);
  }
  .tab {
    padding: 10px 20px;
    font-family: 'Syne', sans-serif;
    font-size: 13px; font-weight: 600; letter-spacing: 0.06em;
    color: var(--text-muted);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all .2s;
    display: flex; align-items: center; gap: 7px;
  }
  .tab:hover { color: var(--text-dim); }
  .tab.active { color: var(--text); border-color: var(--accent-analog); }
  .tab-badge {
    background: var(--surface2);
    padding: 2px 7px; border-radius: 20px;
    font-size: 11px; color: var(--text-muted);
  }
  .tab.active .tab-badge { background: var(--accent-analog-dim); color: var(--accent-analog); }
  main {
    padding: 28px 32px;
    max-width: 1400px;
    margin: 0 auto;
  }
  .page { display: none; }
  .page.active { display: block; animation: fadeIn .2s ease; }
  @keyframes fadeIn { from { opacity:0; transform: translateY(6px); } to { opacity:1; transform:none; } }

  /* Cards e grids */
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 16px;
    margin-bottom: 28px;
  }
  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    position: relative;
    overflow: hidden;
    transition: border-color .2s;
  }
  .stat-card:hover { border-color: var(--text-muted); }
  .stat-card::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0; height: 2px;
  }
  .stat-card.analog::before { background: var(--accent-analog); }
  .stat-card.digital::before { background: var(--accent-digital); }
  .stat-card.total::before { background: linear-gradient(90deg, var(--accent-analog), var(--accent-digital)); }
  .stat-card.clients::before { background: var(--green); }
  .stat-label {
    font-size: 11px; font-weight: 700; letter-spacing: 0.1em;
    text-transform: uppercase; color: var(--text-muted);
    margin-bottom: 8px;
    display: flex; align-items: center; gap: 6px;
  }
  .stat-dot { width: 6px; height: 6px; border-radius: 50%; }
  .stat-dot.analog { background: var(--accent-analog); }
  .stat-dot.digital { background: var(--accent-digital); }
  .stat-dot.total { background: var(--green); }
  .stat-value {
    font-size: 28px; font-weight: 800;
    font-family: 'JetBrains Mono', monospace;
    line-height: 1;
  }
  .stat-value.money::before { content: 'R$ '; font-size: 14px; font-weight: 500; color: var(--text-muted); }
  .stat-sub { font-size: 12px; color: var(--text-muted); margin-top: 4px; }

  .section-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 16px;
    flex-wrap: wrap;
    gap: 8px;
  }
  .section-title {
    font-family: 'Syne', sans-serif;
    font-size: 15px; font-weight: 700; letter-spacing: 0.05em;
    display: flex; align-items: center; gap: 8px;
  }

  .filters {
    display: flex; gap: 8px; align-items: center;
    margin-bottom: 20px; flex-wrap: wrap;
  }
  .filter-btn, .view-toggle {
    padding: 6px 14px; border-radius: 6px;
    font-family: 'Inter', sans-serif; font-size: 12px; font-weight: 600;
    cursor: pointer; transition: all .15s;
    background: var(--surface); border: 1px solid var(--border);
    color: var(--text-muted);
  }
  .filter-btn:hover, .view-toggle:hover { border-color: var(--text-muted); color: var(--text); }
  .filter-btn.active { background: var(--surface2); border-color: var(--accent-analog); color: var(--accent-analog); }
  .search-input {
    background: var(--surface); border: 1px solid var(--border);
    color: var(--text); font-family: 'Inter', monospace; font-size: 13px;
    padding: 7px 14px; border-radius: 6px;
    outline: none; width: 220px;
  }
  .search-input:focus { border-color: var(--text-muted); }

  /* Cards de trabalhos (agrupados por cliente) */
  .cliente-group {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    margin-bottom: 20px;
    overflow: hidden;
  }
  .group-header {
    background: var(--surface2);
    padding: 14px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    cursor: pointer;
    border-bottom: 1px solid var(--border);
    transition: background .2s;
  }
  .group-header:hover { background: #23232b; }
  .group-header-left { display: flex; align-items: baseline; gap: 12px; flex-wrap: wrap; }
  .cliente-nome { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 16px; }
  .cliente-stats { font-size: 12px; color: var(--text-muted); }
  .cliente-total { font-family: 'JetBrains Mono', monospace; color: var(--green); font-weight: 600; }
  .cards-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 16px;
    padding: 20px;
  }
  .trabalho-card {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 14px;
    transition: all .2s;
  }
  .trabalho-card:hover { transform: translateY(-2px); border-color: var(--text-muted); }
  .card-header { display: flex; justify-content: space-between; align-items: start; margin-bottom: 8px; }
  .card-title { font-weight: 700; font-size: 14px; }
  .card-type-badge { font-size: 10px; padding: 2px 8px; border-radius: 20px; background: var(--accent-analog-dim); color: var(--accent-analog); }
  .card-type-badge.digital { background: var(--accent-digital-dim); color: var(--accent-digital); }
  .card-details { font-size: 12px; color: var(--text-dim); display: flex; flex-direction: column; gap: 6px; margin: 10px 0; }
  .card-status { display: inline-block; padding: 2px 8px; border-radius: 20px; font-size: 10px; font-weight: 700; background: rgba(251,191,36,0.1); color: #fbbf24; }
  .card-status.andamento { background: rgba(59,130,246,0.1); color: #60a5fa; }
  .card-status.concluido { background: rgba(74,222,128,0.1); color: var(--green); }
  .card-status.pago { background: rgba(74,222,128,0.1); color: var(--green); }
  .card-status.cancelado { background: rgba(248,113,113,0.1); color: var(--red); }
  .card-value { font-family: 'JetBrains Mono', monospace; font-weight: 600; font-size: 16px; color: var(--green); }
  .card-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 10px; }
  .action-btn {
    background: none; border: 1px solid var(--border);
    color: var(--text-muted); cursor: pointer;
    padding: 4px 8px; border-radius: 5px;
    font-size: 12px; transition: all .15s;
  }
  .action-btn:hover { background: var(--surface); color: var(--text); border-color: var(--text-muted); }
  .action-btn.del:hover { border-color: var(--red); color: var(--red); }

  /* Preços cards */
  .precos-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 16px;
  }
  .preco-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 16px;
    transition: border-color .2s;
  }
  .preco-card:hover { border-color: var(--text-muted); }
  .preco-nome { font-weight: 700; font-size: 14px; display: flex; justify-content: space-between; }
  .preco-valor { font-family: 'JetBrains Mono', monospace; font-size: 18px; font-weight: 600; color: var(--green); margin: 8px 0; }
  .preco-cliente { font-size: 11px; color: var(--accent-digital); }

  /* Dashboard gadgets */
  .gadgets-row {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 20px;
    margin-bottom: 28px;
  }
  .gadget-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px;
  }
  .gadget-title {
    font-family: 'Syne', sans-serif;
    font-size: 12px; font-weight: 700; letter-spacing: 0.1em;
    text-transform: uppercase; color: var(--text-muted);
    margin-bottom: 14px;
  }
  .donut-container {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 20px;
    flex-wrap: wrap;
  }
  .donut-svg { width: 120px; height: 120px; }
  .donut-legend { display: flex; flex-direction: column; gap: 6px; font-size: 12px; }
  .meta-bar {
    background: var(--surface2);
    border-radius: 20px;
    height: 10px;
    width: 100%;
    margin: 12px 0;
  }
  .meta-fill {
    background: var(--accent-analog);
    width: 0%;
    height: 100%;
    border-radius: 20px;
    transition: width 0.6s;
  }
  .entrega-item {
    display: flex;
    justify-content: space-between;
    padding: 8px 0;
    border-bottom: 1px solid var(--border);
    font-size: 13px;
  }
  .entrega-data { color: var(--accent-digital); font-family: monospace; }

  /* Modais */
  .modal-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.7); backdrop-filter: blur(4px);
    z-index: 1000; align-items: center; justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 28px; width: 560px; max-width: 95vw;
    max-height: 90vh; overflow-y: auto;
  }
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .form-group { display: flex; flex-direction: column; gap: 6px; }
  .form-group.full { grid-column: 1/-1; }
  label {
    font-size: 11px; font-weight: 700; letter-spacing: 0.1em;
    text-transform: uppercase; color: var(--text-muted);
  }
  input, select, textarea {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'Inter', monospace;
    padding: 9px 12px; border-radius: 7px;
    outline: none;
  }
  .type-toggle {
    display: grid; grid-template-columns: 1fr 1fr;
    background: var(--surface2); border-radius: 7px;
    overflow: hidden;
  }
  .type-option {
    padding: 9px; text-align: center; cursor: pointer;
    font-family: 'Syne', sans-serif; font-size: 12px; font-weight: 700;
    color: var(--text-muted);
  }
  .type-option.selected.analog { background: var(--accent-analog-dim); color: var(--accent-analog); }
  .type-option.selected.digital { background: var(--accent-digital-dim); color: var(--accent-digital); }
  .form-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 22px; }
  .btn-save {
    background: var(--accent-analog); color: #000;
    border: none; padding: 9px 24px; border-radius: var(--radius-sm);
    cursor: pointer;
  }
  .btn-cancel {
    background: none; border: 1px solid var(--border);
    color: var(--text-muted); padding: 9px 20px; border-radius: var(--radius-sm);
    cursor: pointer;
  }
  .empty { padding: 48px; text-align: center; color: var(--text-muted); }
  @media (max-width: 700px) {
    main { padding: 16px; }
    header { padding: 0 16px; flex-wrap: wrap; height: auto; }
    .cards-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<div id="tela-login" style="display:flex; position:fixed; inset:0; background:var(--bg); align-items:center; justify-content:center; flex-direction:column; gap:24px; z-index:9999">
  <div style="text-align:center">
    <div style="font-family:'Syne'; font-size:32px; font-weight:800;">LAB<span style="color:var(--accent-analog)">.</span>STUDIO</div>
    <div style="font-size:13px; color:var(--text-muted)">Sistema de Gestão</div>
  </div>
  <button onclick="fazerLogin()" style="background:white; color:#333; border:none; padding:12px 28px; border-radius:10px; font-family:'Inter',sans-serif; font-weight:700; cursor:pointer; display:flex; align-items:center; gap:10px;">
    <img src="https://www.google.com/favicon.ico" width="18"> Entrar com Google
  </button>
  <div id="login-error" style="color:var(--red); font-size:12px;"></div>
</div>

<div id="app-root" style="display:none">
<header>
  <div class="logo"><div class="logo-dot"></div>LAB<span>.</span>STUDIO</div>
  <div class="header-right">
    <span id="sync-status" style="font-size:12px;">⏳</span>
    <button id="btn-logout" onclick="window._signOut()" style="display:none;" class="btn-backup">⎋ Sair</button>
    <button class="btn-backup" onclick="exportarBackup()">⬇ Backup</button>
    <label class="btn-backup importar">⬆ Importar<input type="file" accept=".json" onchange="importarBackup(event)" style="display:none"></label>
    <button class="btn-add" onclick="openModal()">+ Trabalho</button>
  </div>
</header>
<nav>
  <div class="tab active" onclick="switchTab('dashboard')">◈ Dashboard</div>
  <div class="tab" onclick="switchTab('trabalhos')">⊞ Trabalhos <span class="tab-badge" id="badge-trabalhos">0</span></div>
  <div class="tab" onclick="switchTab('clientes')">◎ Clientes <span class="tab-badge" id="badge-clientes">0</span></div>
  <div class="tab" onclick="switchTab('precos')">◑ Preços <span class="tab-badge" id="badge-precos">0</span></div>
</nav>
<main>
  <!-- DASHBOARD -->
  <div class="page active" id="page-dashboard">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; flex-wrap:wrap;">
      <div class="section-title">Visão Geral</div>
      <input type="month" id="dash-mes" style="background:var(--surface); border:1px solid var(--border); padding:6px 12px; border-radius:6px;" onchange="renderDashboard()">
    </div>
    <div class="stats-grid" id="stats-cards"></div>

    <div class="gadgets-row">
      <div class="gadget-card">
        <div class="gadget-title">Proporção de Receita</div>
        <div class="donut-container" id="donut-chart"></div>
      </div>
      <div class="gadget-card">
        <div class="gadget-title">Meta Mensal</div>
        <div id="meta-container"></div>
      </div>
      <div class="gadget-card">
        <div class="gadget-title">📅 Próximas Entregas</div>
        <div id="entregas-lista"></div>
      </div>
    </div>

    <div class="section-header"><div class="section-title">Receita Últimos 6 Meses</div></div>
    <div class="gadget-card" id="grafico-mensal" style="margin-bottom:20px;"></div>
    <div class="section-header"><div class="section-title">Recentes</div></div>
    <div id="recent-panel" class="gadget-card"></div>
  </div>

  <!-- TRABALHOS (CARDS POR CLIENTE) -->
  <div class="page" id="page-trabalhos">
    <div class="filters">
      <input class="search-input" type="text" placeholder="Buscar trabalho ou cliente..." id="search-trabalhos" oninput="renderTrabalhos()">
      <button class="filter-btn active" onclick="setFilterTrab('todos')" id="f-todos">Todos</button>
      <button class="filter-btn" onclick="setFilterTrab('analog')">Analógico</button>
      <button class="filter-btn" onclick="setFilterTrab('digital')">Digital</button>
      <button class="filter-btn" onclick="setFilterTrab('pendente')">Pendente</button>
      <button class="filter-btn" onclick="setFilterTrab('andamento')">Andamento</button>
      <button class="filter-btn" onclick="setFilterTrab('concluido')">Concluído</button>
      <input type="month" id="f-mes-trab" onchange="renderTrabalhos()">
    </div>
    <div id="trabalhos-cards-container"></div>
  </div>

  <!-- CLIENTES (tabela mantida) -->
  <div class="page" id="page-clientes">
    <div class="filters">
      <input class="search-input" placeholder="Buscar cliente..." id="search-clientes" oninput="renderClientes()">
      <button class="btn-add" onclick="openClienteModal()" style="margin-left:auto">+ Cliente</button>
    </div>
    <div class="table-wrap" style="overflow-x:auto">
      <table style="width:100%">
        <thead><tr><th>ID</th><th>Nome</th><th>Contato</th><th>Total Gasto</th><th>Trabalhos</th><th>Ações</th></tr></thead>
        <tbody id="tbody-clientes"></tbody>
      </table>
    </div>
  </div>

  <!-- PREÇOS (cards com filtro por cliente) -->
  <div class="page" id="page-precos">
    <div class="filters">
      <input class="search-input" placeholder="Buscar serviço..." id="search-precos" oninput="renderPrecos()">
      <select id="filtro-cliente-preco" style="background:var(--surface); border:1px solid var(--border); padding:6px; border-radius:6px;" onchange="renderPrecos()">
        <option value="">Todos os clientes</option>
      </select>
      <button class="btn-add" onclick="openPrecoModal()">+ Preço</button>
    </div>
    <div id="precos-cards-container" class="precos-grid"></div>
  </div>
</main>

<!-- MODAIS -->
<div class="modal-overlay" id="modal-trabalho"><div class="modal"><button class="modal-close" onclick="closeModal()">✕</button><div class="modal-title" id="modal-title-text">🖌️ Trabalho</div><input type="hidden" id="edit-id"><div class="form-grid">
  <div class="form-group full"><label>Tipo</label><div class="type-toggle"><div class="type-option selected analog" onclick="selectType('analog')">⬡ Analógico</div><div class="type-option" onclick="selectType('digital')">◈ Digital</div></div><input type="hidden" id="f-tipo" value="analog"></div>
  <div class="form-group"><label>Cliente</label><select id="f-cliente" onchange="atualizarSeletorPrecos()"><option value="">— Selecionar —</option></select></div>
  <div class="form-group"><label>Paciente</label><input type="text" id="f-paciente"></div>
  <div class="form-group full"><label>Tabela de Preços</label><select id="f-preco-sel" onchange="aplicarPrecoTabela()"><option value="">— Selecionar —</option></select></div>
  <div class="form-group full"><label>Trabalho</label><input type="text" id="f-nome"></div>
  <div class="form-group" id="grupo-elementos" style="display:none"><label>Elementos</label><input type="number" id="f-elementos" min="0" oninput="calcValorDigital()"></div>
  <div class="form-group" id="grupo-valor-elemento" style="display:none"><label>Valor/Elemento</label><input type="number" id="f-valor-elemento" step="0.01" oninput="calcValorDigital()"></div>
  <div class="form-group"><label>Valor Total (R$)</label><input type="number" id="f-valor" step="0.01"></div>
  <div class="form-group"><label>Status</label><select id="f-status"><option value="pendente">Pendente</option><option value="andamento">Andamento</option><option value="concluido">Concluído</option><option value="pago">Pago</option><option value="cancelado">Cancelado</option></select></div>
  <div class="form-group"><label>Data</label><input type="date" id="f-data"></div>
  <div class="form-group"><label>Data Entrega (prevista)</label><input type="date" id="f-data-entrega"></div>
  <div class="form-group full"><label>Descrição</label><textarea id="f-desc"></textarea></div>
</div><div class="form-actions"><button class="btn-cancel" onclick="closeModal()">Cancelar</button><button class="btn-save" onclick="saveTrabalho()">Salvar</button></div></div></div>

<div class="modal-overlay" id="modal-cliente"><div class="modal"><button class="modal-close" onclick="closeClienteModal()">✕</button><div class="modal-title">👤 Cliente</div><input type="hidden" id="ce-id"><div class="form-grid"><div class="form-group full"><label>Nome</label><input id="ce-nome"></div><div class="form-group"><label>Contato</label><input id="ce-contato"></div><div class="form-group"><label>Instagram</label><input id="ce-social"></div><div class="form-group full"><label>Obs</label><textarea id="ce-obs"></textarea></div></div><div class="form-actions"><button class="btn-cancel" onclick="closeClienteModal()">Cancelar</button><button class="btn-save" onclick="saveCliente()">Salvar</button></div></div></div>

<div class="modal-overlay" id="modal-preco"><div class="modal"><button class="modal-close" onclick="closePrecoModal()">✕</button><div class="modal-title">◑ Preço</div><input type="hidden" id="pr-id"><div class="form-grid"><div class="form-group full"><label>Serviço</label><input id="pr-nome"></div><div class="form-group"><label>Tipo</label><select id="pr-tipo"><option value="analog">Analógico</option><option value="digital">Digital</option></select></div><div class="form-group"><label>Valor (R$)</label><input type="number" id="pr-valor" step="0.01"></div><div class="form-group full"><label>Cliente (opcional)</label><select id="pr-cliente"><option value="">— Global —</option></select></div><div class="form-group full"><label>Observações</label><input id="pr-obs"></div></div><div class="form-actions"><button class="btn-cancel" onclick="closePrecoModal()">Cancelar</button><button class="btn-save" onclick="savePreco()">Salvar</button></div></div></div>
</div>

<script>
// DADOS GLOBAIS
window.trabalhos = window.trabalhos || [];
window.clientes = window.clientes || [];
window.precos = window.precos || [];
let filterTrabAtivo = 'todos';
let metaMensal = 5000; // meta padrão R$

// UTILS
function fmt(n) { return Number(n).toLocaleString('pt-BR', {minimumFractionDigits:2}); }
function formatDate(d) { if(!d) return '—'; const [y,m,day]=d.split('-'); return `${day}/${m}/${y}`; }
function statusLabel(s) { return { pendente:'Pendente', andamento:'Andamento', concluido:'Concluído', pago:'Pago ✓', cancelado:'Cancelado' }[s]||s; }
function uid() { return Date.now().toString(36)+Math.random().toString(36).slice(2,6); }

// FIREBASE WRAPPERS
async function saveTrabalhoFB(obj) { await window._setDoc(window._userDoc('trabalhos', obj.id), obj); }
async function deleteTrabalhoFB(id) { await window._deleteDoc(window._userDoc('trabalhos', id)); }
async function saveClienteFB(obj) { await window._setDoc(window._userDoc('clientes', obj.id), obj); }
async function deleteClienteFB(id) { await window._deleteDoc(window._userDoc('clientes', id)); }
async function savePrecoFB(obj) { await window._setDoc(window._userDoc('precos', obj.id), obj); }
async function deletePrecoFB(id) { await window._deleteDoc(window._userDoc('precos', id)); }

// RENDER DASHBOARD (com gadgets)
function renderDashboard() {
  const mesSel = document.getElementById('dash-mes').value || new Date().toISOString().slice(0,7);
  if(!document.getElementById('dash-mes').value) document.getElementById('dash-mes').value = mesSel;
  const doMes = trabalhos.filter(t=> t.data && t.data.slice(0,7)===mesSel);
  const analog = doMes.filter(t=>t.tipo==='analog').reduce((s,t)=>s+t.valor,0);
  const digital = doMes.filter(t=>t.tipo==='digital').reduce((s,t)=>s+t.valor,0);
  const total = analog+digital;
  const aReceber = trabalhos.filter(t=>t.status==='concluido').reduce((s,t)=>s+t.valor,0);
  const stats = `<div class="stat-card analog"><div class="stat-label"><span class="stat-dot analog"></span>Analógico (mês)</div><div class="stat-value money">${fmt(analog)}</div><div class="stat-sub">${doMes.filter(t=>t.tipo==='analog').length} trabalhos</div></div>
                 <div class="stat-card digital"><div class="stat-label"><span class="stat-dot digital"></span>Digital (mês)</div><div class="stat-value money">${fmt(digital)}</div><div class="stat-sub">${doMes.filter(t=>t.tipo==='digital').length} trabalhos</div></div>
                 <div class="stat-card total"><div class="stat-label"><span class="stat-dot total"></span>Total do Mês</div><div class="stat-value money">${fmt(total)}</div><div class="stat-sub">${doMes.length} trabalhos</div></div>
                 <div class="stat-card"><div class="stat-label"><span class="stat-dot" style="background:#f87171"></span>A Receber</div><div class="stat-value money" style="color:#f87171">${fmt(aReceber)}</div><div class="stat-sub">concluídos não pagos</div></div>
                 <div class="stat-card clients"><div class="stat-label"><span class="stat-dot clients"></span>Clientes</div><div class="stat-value">${clientes.length}</div></div>`;
  document.getElementById('stats-cards').innerHTML = stats;

  // Donut
  const totalGeral = analog+digital;
  const analogPct = totalGeral ? (analog/totalGeral)*100 : 0;
  const digitalPct = totalGeral ? (digital/totalGeral)*100 : 0;
  const donutHtml = `<svg viewBox="0 0 40 40" class="donut-svg"><circle cx="20" cy="20" r="16" fill="none" stroke="var(--surface2)" stroke-width="4"/><circle cx="20" cy="20" r="16" fill="none" stroke="var(--accent-analog)" stroke-width="4" stroke-dasharray="${analogPct*1.005} 100" stroke-dashoffset="0" transform="rotate(-90 20 20)"/><circle cx="20" cy="20" r="16" fill="none" stroke="var(--accent-digital)" stroke-width="4" stroke-dasharray="${digitalPct*1.005} 100" stroke-dashoffset="${-analogPct*1.005}" transform="rotate(-90 20 20)"/></svg>
                     <div class="donut-legend"><span style="color:var(--accent-analog)">⬡ Analógico ${fmt(analog)}</span><span style="color:var(--accent-digital)">◈ Digital ${fmt(digital)}</span></div>`;
  document.getElementById('donut-chart').innerHTML = donutHtml;

  // Meta
  const metaProgress = Math.min(100, (total/metaMensal)*100);
  document.getElementById('meta-container').innerHTML = `<div>Meta mensal: R$ ${fmt(metaMensal)}</div><div class="meta-bar"><div class="meta-fill" style="width:${metaProgress}%"></div></div><div>Arrecadado: R$ ${fmt(total)} (${Math.round(metaProgress)}%)</div><button class="btn-backup" style="margin-top:10px;" onclick="definirMeta()">Alterar Meta</button>`;

  // Entregas futuras
  const hoje = new Date().toISOString().slice(0,10);
  const entregas = trabalhos.filter(t=> t.dataEntrega && t.dataEntrega >= hoje && t.status !== 'pago' && t.status !== 'cancelado').sort((a,b)=>a.dataEntrega.localeCompare(b.dataEntrega)).slice(0,5);
  if(entregas.length) document.getElementById('entregas-lista').innerHTML = entregas.map(t=>`<div class="entrega-item"><span>${t.nome}</span><span class="entrega-data">${formatDate(t.dataEntrega)}</span></div>`).join('');
  else document.getElementById('entregas-lista').innerHTML = '<div class="empty-icon">📭 Nenhuma entrega prevista</div>';

  // Gráfico 6 meses
  const [ano, mes] = mesSel.split('-').map(Number);
  let meses6 = [];
  for(let i=5;i>=0;i--) { let d=new Date(ano, mes-1-i,1); let key=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`; let totalMes=trabalhos.filter(t=>t.data&&t.data.slice(0,7)===key).reduce((s,t)=>s+t.valor,0); meses6.push({key, label:d.toLocaleDateString('pt-BR',{month:'short',year:'2-digit'}), total:totalMes}); }
  const maxMes = Math.max(...meses6.map(m=>m.total))||1;
  document.getElementById('grafico-mensal').innerHTML = `<div class="bar-chart">`+meses6.map(m=>`<div><div class="bar-label"><span>${m.label}</span><span>R$ ${fmt(m.total)}</span></div><div class="bar-track"><div class="bar-fill" style="width:${(m.total/maxMes*100)}%; background:${m.key===mesSel?'var(--accent-analog)':'var(--accent-digital)'}; height:6px; border-radius:3px;"></div></div></div>`).join('')+`</div>`;

  // Recentes
  const recent = [...trabalhos].sort((a,b)=>b.criadoEm-a.criadoEm).slice(0,5);
  document.getElementById('recent-panel').innerHTML = recent.map(t=>`<div class="entrega-item"><span>${t.nome}</span><span>R$ ${fmt(t.valor)}</span></div>`).join('')||'<div>Nenhum trabalho recente</div>';
}

function definirMeta() { let nova=prompt('Nova meta mensal (R$):', metaMensal); if(nova && !isNaN(parseFloat(nova))) metaMensal=parseFloat(nova); renderDashboard(); }

// RENDER TRABALHOS (cards agrupados por cliente)
function renderTrabalhos() {
  let search = (document.getElementById('search-trabalhos').value||'').toLowerCase();
  let mesFiltro = document.getElementById('f-mes-trab')?.value||'';
  let list = trabalhos.filter(t=>{
    let c = clientes.find(x=>x.id===t.clienteId);
    let matchSearch = !search || t.nome.toLowerCase().includes(search) || (c&&c.nome.toLowerCase().includes(search));
    let matchMes = !mesFiltro || (t.data && t.data.slice(0,7)===mesFiltro);
    let matchTipo = filterTrabAtivo==='todos' || (filterTrabAtivo==='analog' && t.tipo==='analog') || (filterTrabAtivo==='digital' && t.tipo==='digital') || ['pendente','andamento','concluido'].includes(filterTrabAtivo) && t.status===filterTrabAtivo;
    return matchSearch && matchMes && matchTipo;
  });
  let grouped = new Map();
  list.forEach(t=>{ let cid=t.clienteId||'semcliente'; if(!grouped.has(cid)) grouped.set(cid,[]); grouped.get(cid).push(t); });
  let container = document.getElementById('trabalhos-cards-container');
  if(grouped.size===0) { container.innerHTML='<div class="empty">Nenhum trabalho encontrado</div>'; return; }
  let html='';
  for(let [cid, works] of grouped.entries()){
    let cliente = cid==='semcliente' ? null : clientes.find(c=>c.id===cid);
    let nomeCliente = cliente ? cliente.nome : 'Sem cliente';
    let totalCliente = works.reduce((s,t)=>s+t.valor,0);
    html+=`<div class="cliente-group"><div class="group-header" onclick="toggleGroup(this)"><div class="group-header-left"><span class="cliente-nome">${nomeCliente}</span><span class="cliente-stats">${works.length} trabalho(s)</span><span class="cliente-total">R$ ${fmt(totalCliente)}</span></div><span>▼</span></div><div class="cards-grid" style="display:grid;">`;
    works.forEach(t=>{
      let tipoClass = t.tipo==='analog' ? '' : 'digital';
      html+=`<div class="trabalho-card"><div class="card-header"><span class="card-title">${t.nome}</span><span class="card-type-badge ${tipoClass}">${t.tipo==='analog'?'Analógico':'Digital'}</span></div>
              <div class="card-details"><span>Paciente: ${t.paciente||'—'}</span><span>Data: ${formatDate(t.data)}</span><span class="card-status ${t.status}">${statusLabel(t.status)}</span></div>
              <div class="card-value">R$ ${fmt(t.valor)}</div><div class="card-actions"><button class="action-btn" onclick="openModal('${t.id}')">✎</button><button class="action-btn del" onclick="deleteTrabalho('${t.id}')">✕</button></div></div>`;
    });
    html+=`</div></div>`;
  }
  container.innerHTML = html;
}
function toggleGroup(el) { let grid = el.nextElementSibling; if(grid) grid.style.display = grid.style.display==='none' ? 'grid' : 'none'; }
function setFilterTrab(f) { filterTrabAtivo=f; document.querySelectorAll('#page-trabalhos .filter-btn').forEach(b=>b.classList.remove('active')); document.getElementById(`f-${f}`)?.classList.add('active'); renderTrabalhos(); }

// RENDER CLIENTES (tabela)
function renderClientes() {
  let q = (document.getElementById('search-clientes').value||'').toLowerCase();
  let list = clientes.filter(c=>!q || c.nome.toLowerCase().includes(q));
  let tbody = document.getElementById('tbody-clientes');
  if(!list.length) { tbody.innerHTML='<tr><td colspan="6"><div class="empty">Nenhum cliente</div></td></tr>'; return; }
  tbody.innerHTML = list.map((c,i)=>`<tr><td>#${i+1}</td><td><strong>${c.nome}</strong>${c.social?`<br><span style="font-size:11px">${c.social}</span>`:''}</td><td>${c.contato||'—'}</td><td class="money-cell">R$ ${fmt(trabalhos.filter(t=>t.clienteId===c.id).reduce((s,t)=>s+t.valor,0))}</td><td>${trabalhos.filter(t=>t.clienteId===c.id).length}</td><td><button class="action-btn pdf-btn" onclick="exportClientePDF('${c.id}')">PDF</button><button class="action-btn" onclick="openClienteModal('${c.id}')">✎</button><button class="action-btn del" onclick="deleteCliente('${c.id}')">✕</button></td></tr>`).join('');
}

// PREÇOS COM FILTRO POR CLIENTE
function renderPrecos() {
  let search = (document.getElementById('search-precos').value||'').toLowerCase();
  let clienteFiltro = document.getElementById('filtro-cliente-preco').value;
  let list = precos.filter(p=> (!clienteFiltro || p.clienteId===clienteFiltro) && p.nome.toLowerCase().includes(search));
  let container = document.getElementById('precos-cards-container');
  if(!list.length) { container.innerHTML='<div class="empty">Nenhum preço</div>'; return; }
  container.innerHTML = list.map(p=>`<div class="preco-card"><div class="preco-nome"><span>${p.nome}</span><span class="preco-cliente">${p.clienteId? (clientes.find(c=>c.id===p.clienteId)?.nome||'Cliente'):'🌍 Global'}</span></div><div class="preco-valor">R$ ${fmt(p.valor)}</div><div>${p.obs||''}</div><div><button class="action-btn" onclick="openPrecoModal('${p.id}')">✎</button><button class="action-btn del" onclick="deletePreco('${p.id}')">✕</button></div></div>`).join('');
}
function popularSelectClientesPreco() {
  let sel = document.getElementById('pr-cliente');
  sel.innerHTML = '<option value="">— Global —</option>';
  clientes.forEach(c=>{ sel.innerHTML+=`<option value="${c.id}">${c.nome}</option>`; });
  let filtro = document.getElementById('filtro-cliente-preco');
  filtro.innerHTML = '<option value="">Todos os clientes</option>';
  clientes.forEach(c=>{ filtro.innerHTML+=`<option value="${c.id}">${c.nome}</option>`; });
}
function atualizarSeletorPrecos() {
  let clienteId = document.getElementById('f-cliente').value;
  let tipo = document.getElementById('f-tipo').value;
  let precosFiltrados = precos.filter(p=> (p.clienteId===clienteId || !p.clienteId) && p.tipo===tipo);
  let sel = document.getElementById('f-preco-sel');
  sel.innerHTML = '<option value="">— Selecionar —</option>';
  precosFiltrados.forEach(p=>{ sel.innerHTML+=`<option value="${p.id}">${p.nome} — R$ ${fmt(p.valor)}</option>`; });
}
function aplicarPrecoTabela() { let id=document.getElementById('f-preco-sel').value; let p=precos.find(x=>x.id===id); if(p){ document.getElementById('f-nome').value=p.nome; document.getElementById('f-valor').value=p.valor; } }

// MODAL TRABALHO
function openModal(id) {
  document.getElementById('modal-trabalho').classList.add('open');
  let selCliente = document.getElementById('f-cliente');
  selCliente.innerHTML = '<option value="">— Selecionar —</option>';
  clientes.forEach(c=>{ selCliente.innerHTML+=`<option value="${c.id}">${c.nome}</option>`; });
  document.getElementById('f-data').value = new Date().toISOString().split('T')[0];
  if(!id) { document.getElementById('edit-id').value=''; selectType('analog'); document.getElementById('f-nome').value=''; document.getElementById('f-valor').value=''; document.getElementById('f-status').value='pendente'; document.getElementById('f-paciente').value=''; document.getElementById('f-desc').value=''; document.getElementById('f-data-entrega').value=''; document.getElementById('f-elementos').value=''; document.getElementById('f-valor-elemento').value=''; }
  else { let t=trabalhos.find(x=>x.id===id); if(t){ document.getElementById('edit-id').value=t.id; selectType(t.tipo); document.getElementById('f-nome').value=t.nome; document.getElementById('f-valor').value=t.valor; document.getElementById('f-status').value=t.status; document.getElementById('f-paciente').value=t.paciente||''; document.getElementById('f-desc').value=t.desc||''; document.getElementById('f-data-entrega').value=t.dataEntrega||''; document.getElementById('f-elementos').value=t.elementos||''; document.getElementById('f-valor-elemento').value=t.valorElemento||''; document.getElementById('f-cliente').value=t.clienteId||''; document.getElementById('f-data').value=t.data||''; atualizarSeletorPrecos(); } }
}
function closeModal() { document.getElementById('modal-trabalho').classList.remove('open'); }
function selectType(tipo){
  document.getElementById('f-tipo').value=tipo;
  document.getElementById('opt-analog').className='type-option'+(tipo==='analog'?' selected analog':'');
  document.getElementById('opt-digital').className='type-option'+(tipo==='digital'?' selected digital':'');
  let isDigital=tipo==='digital';
  document.getElementById('grupo-elementos').style.display=isDigital?'':'none';
  document.getElementById('grupo-valor-elemento').style.display=isDigital?'':'none';
  atualizarSeletorPrecos();
}
function calcValorDigital(){ let qtd=parseFloat(document.getElementById('f-elementos').value)||0; let vpe=parseFloat(document.getElementById('f-valor-elemento').value)||0; if(qtd&&vpe) document.getElementById('f-valor').value=(qtd*vpe).toFixed(2); }
async function saveTrabalho(){
  let id=document.getElementById('edit-id').value;
  let obj={ id:id||uid(), nome:document.getElementById('f-nome').value, paciente:document.getElementById('f-paciente').value, valor:parseFloat(document.getElementById('f-valor').value)||0, tipo:document.getElementById('f-tipo').value, status:document.getElementById('f-status').value, data:document.getElementById('f-data').value, dataEntrega:document.getElementById('f-data-entrega').value, desc:document.getElementById('f-desc').value, clienteId:document.getElementById('f-cliente').value, elementos:parseInt(document.getElementById('f-elementos').value)||0, valorElemento:parseFloat(document.getElementById('f-valor-elemento').value)||0, criadoEm:Date.now() };
  if(!obj.nome) { alert('Nome do trabalho obrigatório'); return; }
  await saveTrabalhoFB(obj);
  closeModal();
}
async function deleteTrabalho(id){ if(confirm('Remover?')) await deleteTrabalhoFB(id); }

// CLIENTE MODAL
function openClienteModal(id){
  document.getElementById('modal-cliente').classList.add('open');
  if(!id){ document.getElementById('ce-id').value=''; document.getElementById('ce-nome').value=''; document.getElementById('ce-contato').value=''; document.getElementById('ce-social').value=''; document.getElementById('ce-obs').value=''; }
  else{ let c=clientes.find(x=>x.id===id); if(c){ document.getElementById('ce-id').value=c.id; document.getElementById('ce-nome').value=c.nome; document.getElementById('ce-contato').value=c.contato||''; document.getElementById('ce-social').value=c.social||''; document.getElementById('ce-obs').value=c.obs||''; } }
}
function closeClienteModal(){ document.getElementById('modal-cliente').classList.remove('open'); }
async function saveCliente(){
  let id=document.getElementById('ce-id').value;
  let obj={ id:id||uid(), nome:document.getElementById('ce-nome').value, contato:document.getElementById('ce-contato').value, social:document.getElementById('ce-social').value, obs:document.getElementById('ce-obs').value };
  if(!obj.nome){ alert('Nome obrigatório'); return; }
  await saveClienteFB(obj);
  closeClienteModal();
  popularSelectClientesPreco();
  atualizarSeletorPrecos();
}
async function deleteCliente(id){ if(confirm('Remover cliente?')) await deleteClienteFB(id); }

// PREÇO MODAL
function openPrecoModal(id){
  document.getElementById('modal-preco').classList.add('open');
  popularSelectClientesPreco();
  if(!id){ document.getElementById('pr-id').value=''; document.getElementById('pr-nome').value=''; document.getElementById('pr-valor').value=''; document.getElementById('pr-obs').value=''; document.getElementById('pr-tipo').value='analog'; document.getElementById('pr-cliente').value=''; }
  else{ let p=precos.find(x=>x.id===id); if(p){ document.getElementById('pr-id').value=p.id; document.getElementById('pr-nome').value=p.nome; document.getElementById('pr-valor').value=p.valor; document.getElementById('pr-obs').value=p.obs||''; document.getElementById('pr-tipo').value=p.tipo; document.getElementById('pr-cliente').value=p.clienteId||''; } }
}
function closePrecoModal(){ document.getElementById('modal-preco').classList.remove('open'); }
async function savePreco(){
  let id=document.getElementById('pr-id').value;
  let obj={ id:id||uid(), nome:document.getElementById('pr-nome').value, valor:parseFloat(document.getElementById('pr-valor').value)||0, tipo:document.getElementById('pr-tipo').value, obs:document.getElementById('pr-obs').value, clienteId:document.getElementById('pr-cliente').value||null };
  if(!obj.nome){ alert('Nome do serviço'); return; }
  await savePrecoFB(obj);
  closePrecoModal();
}
async function deletePreco(id){ if(confirm('Remover preço?')) await deletePrecoFB(id); }

// BACKUP
function exportarBackup(){ let dados={versao:'1.0',exportadoEm:new Date().toISOString(),trabalhos,clientes,precos}; let a=document.createElement('a'); a.href=URL.createObjectURL(new Blob([JSON.stringify(dados,null,2)],{type:'application/json'})); a.download=`lab_backup_${new Date().toISOString().slice(0,10)}.json`; a.click(); }
function importarBackup(event){ let file=event.target.files[0]; if(!file) return; let reader=new FileReader(); reader.onload=async e=>{ try{ let dados=JSON.parse(e.target.result); if(!confirm('Substituir dados atuais?')) return; for(let c of dados.clientes) await saveClienteFB(c); for(let t of dados.trabalhos) await saveTrabalhoFB(t); for(let p of dados.precos||[]) await savePrecoFB(p); alert('Backup importado'); }catch(err){ alert('Arquivo inválido'); } }; reader.readAsText(file); }

// EXPORT PDF CLIENTE (resumido, igual ao original mas adaptado)
function exportClientePDF(clienteId){ let c=clientes.find(x=>x.id===clienteId); if(!c) return; let dataIni=prompt('Data inicial (AAAA-MM-DD):', new Date().toISOString().slice(0,7)+'-01'); if(!dataIni) return; let dataFim=prompt('Data final (AAAA-MM-DD):', new Date().toISOString().slice(0,10)); if(!dataFim) return; let works=trabalhos.filter(t=>t.clienteId===clienteId && t.data>=dataIni && t.data<=dataFim); let {jsPDF}=window.jspdf; let doc=new jsPDF(); doc.setFont('helvetica'); doc.text(`LAB.STUDIO - Relatório ${c.nome}`,20,20); doc.text(`Período: ${dataIni} a ${dataFim}`,20,30); let total=works.reduce((s,t)=>s+t.valor,0); doc.text(`Total: R$ ${fmt(total)}`,20,40); doc.autoTable({startY:50,head:[['Trabalho','Tipo','Status','Valor','Data']],body:works.map(t=>[t.nome,t.tipo,statusLabel(t.status),`R$ ${fmt(t.valor)}`,t.data])}); doc.save(`cliente_${c.nome}.pdf`); }

// SWITCH TAB
function switchTab(tab){
  document.querySelectorAll('.tab').forEach((t,i)=>{ let pages=['dashboard','trabalhos','clientes','precos']; t.classList.toggle('active',pages[i]===tab); });
  document.querySelectorAll('.page').forEach(p=>{ p.classList.toggle('active',p.id===`page-${tab}`); });
  if(tab==='trabalhos') renderTrabalhos();
  if(tab==='clientes') renderClientes();
  if(tab==='dashboard') renderDashboard();
  if(tab==='precos') { renderPrecos(); popularSelectClientesPreco(); }
}
function updateBadges(){
  document.getElementById('badge-trabalhos').textContent=trabalhos.length;
  document.getElementById('badge-clientes').textContent=clientes.length;
  document.getElementById('badge-precos').textContent=precos.length;
}

// INICIALIZAÇÃO
window._appReady=false;
window.switchTab=switchTab; window.setFilterTrab=setFilterTrab; window.openModal=openModal; window.closeModal=closeModal; window.selectType=selectType; window.calcValorDigital=calcValorDigital; window.saveTrabalho=saveTrabalho; window.deleteTrabalho=deleteTrabalho; window.openClienteModal=openClienteModal; window.closeClienteModal=closeClienteModal; window.saveCliente=saveCliente; window.deleteCliente=deleteCliente; window.exportClientePDF=exportClientePDF; window.exportarBackup=exportarBackup; window.importarBackup=importarBackup; window.renderDashboard=renderDashboard; window.renderTrabalhos=renderTrabalhos; window.renderClientes=renderClientes; window.renderPrecos=renderPrecos; window.openPrecoModal=openPrecoModal; window.closePrecoModal=closePrecoModal; window.savePreco=savePreco; window.deletePreco=deletePreco; window.atualizarSeletorPrecos=atualizarSeletorPrecos; window.aplicarPrecoTabela=aplicarPrecoTabela; window.definirMeta=definirMeta; window.toggleGroup=toggleGroup;
window.updateBadges=updateBadges;
</script>
