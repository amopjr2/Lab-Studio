<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0e0e10">
<title>LAB — Sistema de Gestão</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,400&family=Syne:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-app.js";
import { getFirestore, collection, doc, setDoc, deleteDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-firestore.js";
import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyCdxx2EMbsfMVbaL6J9LKN3paFfmESeY6o",
  authDomain: "lab-studio-626f8.firebaseapp.com",
  projectId: "lab-studio-626f8",
  storageBucket: "lab-studio-626f8.firebasestorage.app",
  messagingSenderId: "100658301742",
  appId: "1:100658301742:web:1dfaa150a468b0232cc8bf"
};

const app      = initializeApp(firebaseConfig);
const db       = getFirestore(app);
const auth     = getAuth(app);
const provider = new GoogleAuthProvider();

function userCol(colName) { return collection(db, 'usuarios', window._uid, colName); }
function userDoc(colName, id) { return doc(db, 'usuarios', window._uid, colName, id); }

window.fazerLogin = async () => {
  try { await signInWithPopup(auth, provider); } catch(e) { document.getElementById('login-error').textContent = 'Erro ao fazer login.'; }
};

onAuthStateChanged(auth, user => {
  if (user) {
    window._uid = user.uid;
    document.getElementById('tela-login').style.display = 'none';
    document.getElementById('app-root').style.display = 'block';
    document.getElementById('sync-status').textContent = '🟢 ' + (user.displayName || user.email);

    // Listeners em tempo real
    onSnapshot(userCol('trabalhos'), snap => {
      window.trabalhos = []; snap.forEach(d => window.trabalhos.push(d.data()));
      window.trabalhos.sort((a,b) => (b.criadoEm||0) - (a.criadoEm||0));
      refreshUI();
    });
    onSnapshot(userCol('clientes'), snap => {
      window.clientes = []; snap.forEach(d => window.clientes.push(d.data()));
      refreshUI();
    });
    onSnapshot(userCol('servicos'), snap => {
      window.servicos = []; snap.forEach(d => window.servicos.push(d.data()));
      refreshUI();
    });
  } else {
    document.getElementById('tela-login').style.display = 'flex';
    document.getElementById('app-root').style.display = 'none';
  }
});

function refreshUI() {
    window.renderDashboard?.(); window.renderTrabalhos?.(); 
    window.renderClientes?.(); window.renderServicos?.(); window.updateBadges?.();
}

window._setDoc = setDoc; window._deleteDoc = deleteDoc; window._userDoc = userDoc; window._signOut = () => signOut(auth);
</script>

<style>
  :root {
    --bg: #0e0e10;
    --surface: #17171b;
    --surface2: #1e1e24;
    --border: #2a2a35;
    --accent-analog: #f4a134;
    --accent-digital: #3b9eff;
    --accent-analog-dim: rgba(244,161,52,0.12);
    --accent-digital-dim: rgba(59,158,255,0.12);
    --text: #e8e8f0;
    --text-muted: #6b6b80;
    --text-dim: #9898b0;
    --green: #4ade80;
    --red: #f87171;
    --radius: 10px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Syne', sans-serif; min-height: 100vh; overflow-x: hidden; }
  
  /* GRID NOISE TEXTURE ORIGINAL */
  body::before {
    content: ''; position: fixed; inset: 0;
    background-image: linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px);
    background-size: 40px 40px; pointer-events: none; z-index: 0;
  }

  header {
    position: sticky; top: 0; z-index: 100;
    background: rgba(14,14,16,0.85); backdrop-filter: blur(16px);
    border-bottom: 1px solid var(--border);
    padding: 0 32px; display: flex; align-items: center; justify-content: space-between; height: 60px;
  }
  .logo { font-size: 18px; font-weight: 800; letter-spacing: 0.12em; display: flex; align-items: center; gap: 10px; }
  .logo span { color: var(--accent-analog); }
  .logo-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent-analog); box-shadow: 0 0 10px var(--accent-analog); animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: .3; } }

  .header-right { display: flex; align-items: center; gap: 16px; }

  .btn-backup {
    background: var(--surface2); border: 1px solid var(--border); color: var(--text-dim);
    padding: 7px 14px; border-radius: var(--radius); font-weight: 600; font-size: 12px; cursor: pointer;
    display: flex; align-items: center; gap: 5px; transition: all .2s;
  }
  .btn-add {
    background: var(--accent-analog); color: #000; border: none; padding: 8px 18px;
    border-radius: var(--radius); font-weight: 700; font-size: 13px; cursor: pointer;
    display: flex; align-items: center; gap: 6px;
  }

  nav { display: flex; gap: 4px; padding: 16px 32px 0; border-bottom: 1px solid var(--border); position: relative; z-index: 1; overflow-x: auto; }
  .tab { padding: 10px 20px; font-size: 13px; font-weight: 600; color: var(--text-muted); cursor: pointer; border-bottom: 2px solid transparent; white-space: nowrap; }
  .tab.active { color: var(--text); border-color: var(--accent-analog); }
  .tab-badge { background: var(--surface2); padding: 2px 7px; border-radius: 20px; font-size: 11px; margin-left: 5px; }

  main { padding: 28px 32px; position: relative; z-index: 1; max-width: 1400px; margin: 0 auto; }
  .page { display: none; }
  .page.active { display: block; animation: fadeIn .2s ease; }

  .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 28px; }
  .stat-card { background: var(--surface); border: 1px solid var(--border); padding: 20px; border-radius: var(--radius); border-top: 2px solid var(--accent-analog); position: relative; }
  .stat-card.digital { border-top-color: var(--accent-digital); }
  .stat-value { font-size: 28px; font-weight: 800; font-family: 'DM Mono', monospace; margin-top: 8px; }
  .stat-value.money::before { content: 'R$ '; font-size: 14px; color: var(--text-muted); }

  .table-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; min-width: 600px; }
  th { padding: 12px 16px; font-size: 11px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; text-align: left; border-bottom: 1px solid var(--border); }
  td { padding: 13px 16px; border-bottom: 1px solid rgba(42,42,53,0.6); font-size: 14px; }

  .modal-overlay {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7);
    backdrop-filter: blur(4px); z-index: 1000; align-items: center; justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 14px; padding: 28px; width: 520px; max-width: 95vw;
    max-height: 90vh; overflow-y: auto; position: relative;
  }

  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .form-group { display: flex; flex-direction: column; gap: 6px; }
  .form-group.full { grid-column: 1/-1; }
  label { font-size: 11px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; }
  input, select, textarea {
    background: var(--surface2); border: 1px solid var(--border); color: #fff;
    padding: 9px 12px; border-radius: 7px; font-family: 'DM Mono', monospace; font-size: 13px; outline: none;
  }

  .btn-save { background: var(--accent-analog); color: #000; border: none; padding: 12px; border-radius: 10px; font-weight: 700; cursor: pointer; font-family: 'Syne'; margin-top: 10px; }
  .action-btn { background: none; border: 1px solid var(--border); color: var(--text-muted); cursor: pointer; padding: 5px 10px; border-radius: 5px; font-size: 12px; transition: all .15s; margin-right: 4px; }
  .action-btn.pdf-btn { color: var(--accent-analog); border-color: rgba(244,161,52,0.3); }

  .type-badge { padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 700; }
  .type-badge.analog { background: var(--accent-analog-dim); color: var(--accent-analog); }
  .type-badge.digital { background: var(--accent-digital-dim); color: var(--accent-digital); }

  @media (max-width: 600px) {
    header { padding: 0 16px; }
    .header-right span, .btn-backup span, .btn-add span { display: none; }
    .btn-add::before { content: '+'; font-size: 18px; }
    main { padding: 16px; }
    .stats-grid { grid-template-columns: 1fr 1fr; }
    .form-grid { grid-template-columns: 1fr; }
    .form-group.full { grid-column: 1; }
  }
  @keyframes fadeIn { from { opacity:0; transform: translateY(6px); } to { opacity:1; transform:none; } }
</style>
</head>
<body>

<div id="tela-login" style="display:flex; position:fixed; inset:0; z-index:9999; background:var(--bg); align-items:center; justify-content:center; flex-direction:column; gap:24px;">
    <div style="font-size:32px;font-weight:800;letter-spacing:0.1em">LAB<span style="color:var(--accent-analog)">.</span>STUDIO</div>
    <button onclick="fazerLogin()" style="background:white; color:#333; border:none; padding:12px 28px; border-radius:10px; font-family:'Syne',sans-serif; font-weight:700; cursor:pointer;">Entrar com Google</button>
    <div id="login-error" style="color:var(--red);font-size:12px"></div>
</div>

<div id="app-root" style="display:none">
  <header>
    <div class="logo"><div class="logo-dot"></div>LAB<span>.</span>STUDIO</div>
    <div class="header-right">
      <span id="sync-status" style="font-size:11px;color:var(--text-muted);font-family:'DM Mono'">⏳...</span>
      <button class="btn-backup" onclick="exportarBackup()">⬇ <span>Backup</span></button>
      <label class="btn-backup">⬆ <span>Importar</span><input type="file" onchange="importarBackup(event)" style="display:none"></label>
      <button class="btn-add" onclick="openModal()"><span>Novo Trabalho</span></button>
    </div>
  </header>

  <nav>
    <div class="tab active" onclick="switchTab('dashboard')">◈ Dashboard</div>
    <div class="tab" onclick="switchTab('trabalhos')">⊞ Trabalhos <span class="tab-badge" id="badge-trabalhos">0</span></div>
    <div class="tab" onclick="switchTab('clientes')">◎ Clientes <span class="tab-badge" id="badge-clientes">0</span></div>
    <div class="tab" onclick="switchTab('servicos')">🏷️ Catálogo</div>
  </nav>

  <main>
    <!-- DASHBOARD -->
    <div class="page active" id="page-dashboard">
        <div class="stats-grid">
            <div class="stat-card analog">
                <div class="stat-label">Analógico</div>
                <div class="stat-value money" id="dash-analog">0,00</div>
            </div>
            <div class="stat-card digital">
                <div class="stat-label">Digital</div>
                <div class="stat-value money" id="dash-digital">0,00</div>
            </div>
            <div class="stat-card" style="border-top-color: var(--green)">
                <div class="stat-label">Total Geral</div>
                <div class="stat-value money" id="dash-total">0,00</div>
            </div>
            <div class="stat-card" style="border-top-color: var(--green)">
                <div class="stat-label">Clientes</div>
                <div class="stat-value" id="dash-clients">0</div>
            </div>
        </div>
        <div id="recent-panel"></div>
    </div>

    <!-- TRABALHOS -->
    <div class="page" id="page-trabalhos">
        <input type="text" id="search-trabalhos" placeholder="Buscar..." oninput="renderTrabalhos()" class="search-input" style="width:100%; max-width:400px; margin-bottom:20px">
        <div class="table-wrap">
            <table>
                <thead><tr><th>Cliente</th><th>Trabalho</th><th>Tipo</th><th>Valor</th><th>Ações</th></tr></thead>
                <tbody id="tbody-trabalhos"></tbody>
            </table>
        </div>
    </div>

    <!-- CLIENTES -->
    <div class="page" id="page-clientes">
        <button class="btn-add" onclick="openClienteModal()" style="margin-bottom:20px">+ Novo Cliente</button>
        <div class="table-wrap">
            <table>
                <thead><tr><th>Nome</th><th>Contato</th><th>Total</th><th>Ações</th></tr></thead>
                <tbody id="tbody-clientes"></tbody>
            </table>
        </div>
    </div>

    <!-- CATALOGO -->
    <div class="page" id="page-servicos">
        <div style="background:var(--surface); padding:20px; border-radius:var(--radius); border:1px solid var(--border); margin-bottom:20px">
            <h4 style="margin-bottom:15px">Cadastrar Serviço e Preço</h4>
            <div class="form-grid">
                <div class="form-group"><label>Serviço</label><input type="text" id="s-nome"></div>
                <div class="form-group"><label>Preço Sugerido</label><input type="number" id="s-preco" step="0.01"></div>
                <div class="form-group">
                    <label>Tipo</label>
                    <select id="s-tipo"><option value="analog">Analógico</option><option value="digital">Digital</option></select>
                </div>
                <button class="btn-save" onclick="saveServico()">Salvar no Catálogo</button>
            </div>
        </div>
        <div class="table-wrap">
            <table>
                <thead><tr><th>Serviço</th><th>Preço</th><th>Ações</th></tr></thead>
                <tbody id="tbody-servicos"></tbody>
            </table>
        </div>
    </div>
  </main>

  <!-- MODAL TRABALHO -->
  <div class="modal-overlay" id="modal-trabalho">
    <div class="modal">
        <h3 style="margin-bottom:20px">🖌️ Novo Trabalho</h3>
        <input type="hidden" id="edit-id">
        <div class="form-grid">
            <div class="form-group full">
                <label>Usar Catálogo (Opcional)</label>
                <select id="f-catalogo" onchange="applyCatalogo()"><option value="">— Selecionar —</option></select>
            </div>
            <div class="form-group full"><label>Nome do Trabalho</label><input type="text" id="f-nome"></div>
            <div class="form-group"><label>Cliente</label><select id="f-cliente"></select></div>
            <div class="form-group"><label>Valor (R$)</label><input type="number" id="f-valor" step="0.01"></div>
            <div class="form-group full">
                <label>Tipo</label>
                <select id="f-tipo"><option value="analog">Analógico</option><option value="digital">Digital</option></select>
            </div>
        </div>
        <button class="btn-save" style="width:100%" onclick="saveTrabalho()">Salvar Trabalho</button>
        <button onclick="closeModal()" style="width:100%; background:none; border:none; color:var(--text-muted); margin-top:10px; cursor:pointer">Cancelar</button>
    </div>
  </div>

  <!-- MODAL CLIENTE -->
  <div class="modal-overlay" id="modal-cliente">
    <div class="modal">
        <h3>👤 Cliente</h3>
        <div class="form-group" style="margin-top:15px"><label>Nome</label><input type="text" id="c-nome"></div>
        <div class="form-group"><label>Contato</label><input type="text" id="c-contato"></div>
        <button class="btn-save" style="width:100%" onclick="saveCliente()">Salvar Cliente</button>
        <button onclick="closeClienteModal()" style="width:100%; background:none; border:none; color:var(--text-muted); margin-top:10px; cursor:pointer">Cancelar</button>
    </div>
  </div>
</div>

<script>
window.trabalhos = []; window.clientes = []; window.servicos = [];
const fmt = (n) => Number(n).toLocaleString('pt-BR', {minimumFractionDigits: 2, maximumFractionDigits: 2});

function switchTab(tab) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.getElementById('page-' + tab).classList.add('active');
    event.currentTarget.classList.add('active');
    if(tab === 'trabalhos') renderTrabalhos();
    if(tab === 'clientes') renderClientes();
    if(tab === 'servicos') renderServicos();
}

// CATALOGO
async function saveServico() {
    const nome = document.getElementById('s-nome').value;
    const preco = parseFloat(document.getElementById('s-preco').value) || 0;
    const tipo = document.getElementById('s-tipo').value;
    if(!nome) return alert('Nome obrigatório');
    const id = Date.now().toString();
    await window._setDoc(window._userDoc('servicos', id), {id, nome, preco, tipo});
    document.getElementById('s-nome').value = ''; document.getElementById('s-preco').value = '';
}
function renderServicos() {
    const tbody = document.getElementById('tbody-servicos');
    tbody.innerHTML = window.servicos.map(s => `<tr><td>${s.nome}</td><td>R$ ${fmt(s.preco)}</td><td><button class="action-btn" onclick="deleteServico('${s.id}')">✕</button></td></tr>`).join('');
    const sel = document.getElementById('f-catalogo');
    sel.innerHTML = '<option value="">— Selecionar do Catálogo —</option>' + window.servicos.map(s => `<option value="${s.id}">${s.nome}</option>`).join('');
}
async function deleteServico(id) { if(confirm('Excluir?')) await window._deleteDoc(window._userDoc('servicos', id)); }
function applyCatalogo() {
    const sId = document.getElementById('f-catalogo').value;
    const s = window.servicos.find(x => x.id === sId);
    if(s) { document.getElementById('f-nome').value = s.nome; document.getElementById('f-valor').value = s.preco; document.getElementById('f-tipo').value = s.tipo; }
}

// CLIENTES
function openClienteModal() { document.getElementById('modal-cliente').classList.add('open'); }
function closeClienteModal() { document.getElementById('modal-cliente').classList.remove('open'); }
async function saveCliente() {
    const nome = document.getElementById('c-nome').value;
    if(!nome) return;
    const id = Date.now().toString();
    await window._setDoc(window._userDoc('clientes', id), {id, nome, contato: document.getElementById('c-contato').value});
    closeClienteModal();
}
function renderClientes() {
    const tbody = document.getElementById('tbody-clientes');
    tbody.innerHTML = window.clientes.map(c => {
        const total = window.trabalhos.filter(t => t.clienteId === c.id).reduce((s,t) => s + t.valor, 0);
        return `<tr><td><b>${c.nome}</b></td><td>${c.contato || '-'}</td><td>R$ ${fmt(total)}</td><td><button class="action-btn pdf-btn" onclick="exportClientePDF('${c.id}')">PDF</button><button class="action-btn" onclick="deleteCliente('${c.id}')">✕</button></td></tr>`;
    }).join('');
}
async function deleteCliente(id) { if(confirm('Excluir?')) await window._deleteDoc(window._userDoc('clientes', id)); }

// TRABALHOS
function openModal() {
    document.getElementById('modal-trabalho').classList.add('open');
    const sel = document.getElementById('f-cliente');
    sel.innerHTML = '<option value="">Selecionar Cliente</option>' + window.clientes.map(c => `<option value="${c.id}">${c.nome}</option>`).join('');
}
function closeModal() { document.getElementById('modal-trabalho').classList.remove('open'); }
async function saveTrabalho() {
    const nome = document.getElementById('f-nome').value;
    const id = Date.now().toString();
    await window._setDoc(window._userDoc('trabalhos', id), {
        id, nome, valor: parseFloat(document.getElementById('f-valor').value) || 0,
        clienteId: document.getElementById('f-cliente').value, tipo: document.getElementById('f-tipo').value, criadoEm: Date.now()
    });
    closeModal();
}
function renderTrabalhos() {
    const tbody = document.getElementById('tbody-trabalhos');
    tbody.innerHTML = window.trabalhos.map(t => {
        const c = window.clientes.find(x => x.id === t.clienteId);
        return `<tr><td>${c?c.nome:'-'}</td><td>${t.nome}</td><td><span class="type-badge ${t.tipo}">${t.tipo}</span></td><td>R$ ${fmt(t.valor)}</td><td><button class="action-btn" onclick="deleteTrabalho('${t.id}')">✕</button></td></tr>`;
    }).join('');
}
async function deleteTrabalho(id) { if(confirm('Excluir?')) await window._deleteDoc(window._userDoc('trabalhos', id)); }

// DASHBOARD
function renderDashboard() {
    const totA = window.trabalhos.filter(t => t.tipo === 'analog').reduce((s,t) => s + t.valor, 0);
    const totD = window.trabalhos.filter(t => t.tipo === 'digital').reduce((s,t) => s + t.valor, 0);
    document.getElementById('dash-analog').textContent = fmt(totA);
    document.getElementById('dash-digital').textContent = fmt(totD);
    document.getElementById('dash-total').textContent = fmt(totA + totD);
    document.getElementById('dash-clients').textContent = window.clientes.length;
}
function updateBadges() {
    document.getElementById('badge-trabalhos').textContent = window.trabalhos.length;
    document.getElementById('badge-clientes').textContent = window.clientes.length;
}

// PDF ORIGINAL
window.exportClientePDF = function(clienteId) {
  const { jsPDF } = window.jspdf;
  const c = window.clientes.find(x => x.id === clienteId);
  const works = window.trabalhos.filter(t => t.clienteId === clienteId);
  const doc = new jsPDF();
  const W = 210; const margin = 18;

  doc.setFillColor(14, 14, 16); doc.rect(0, 0, W, 42, 'F');
  doc.setFont('helvetica', 'bold'); doc.setFontSize(18); doc.setTextColor(244, 161, 52); doc.text('LAB.STUDIO', margin, 16);
  doc.setFontSize(9); doc.setTextColor(152, 152, 176); doc.text('Relatório de Cliente', margin, 23);
  doc.setFontSize(14); doc.setTextColor(232, 232, 240); doc.text(c.nome, margin, 34);

  const totA = works.filter(t=>t.tipo==='analog').reduce((s,t)=>s+t.valor,0);
  const totD = works.filter(t=>t.tipo==='digital').reduce((s,t)=>s+t.valor,0);

  doc.setFillColor(30, 24, 14); doc.roundedRect(margin, 50, 50, 20, 2, 2, 'F');
  doc.setTextColor(244, 161, 52); doc.setFontSize(7); doc.text('ANALÓGICO', margin+4, 56);
  doc.setFontSize(10); doc.text('R$ '+fmt(totA), margin+4, 64);

  doc.setFillColor(14, 18, 28); doc.roundedRect(margin+55, 50, 50, 20, 2, 2, 'F');
  doc.setTextColor(59, 158, 255); doc.setFontSize(7); doc.text('DIGITAL', margin+59, 56);
  doc.setFontSize(10); doc.text('R$ '+fmt(totD), margin+59, 64);

  doc.autoTable({ startY: 80, head: [['Serviço', 'Tipo', 'Valor']], body: works.map(t => [t.nome, t.tipo, 'R$ '+fmt(t.valor)]), theme: 'grid', headStyles: {fillColor:[30,30,30]} });
  doc.save(`Relatorio_${c.nome}.pdf`);
}

window.exportarBackup = function() {
    const blob = new Blob([JSON.stringify({trabalhos, clientes, servicos})], {type:'application/json'});
    const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'backup.json'; a.click();
}
window.importarBackup = function(e) {
    const reader = new FileReader();
    reader.onload = async (ev) => {
        const d = JSON.parse(ev.target.result);
        for(let c of d.clientes||[]) await window._setDoc(window._userDoc('clientes', c.id), c);
        for(let s of d.servicos||[]) await window._setDoc(window._userDoc('servicos', s.id), s);
        for(let t of d.trabalhos||[]) await window._setDoc(window._userDoc('trabalhos', t.id), t);
        alert('Importado!');
    };
    reader.readAsText(e.target.files[0]);
}
</script>
