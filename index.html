<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-app.js";
import { getFirestore, collection, doc, setDoc, deleteDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-firestore.js";
import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyCdxx2EMbsfMVbaL6J9LKN3paFfmESeY6o",
  authDomain: "lab-studio-626f8.firebaseapp.com",
  projectId: "lab-studio-626f8",
  storageBucket: "lab-studio-626f8.firebasestorage.app",
  messagingSenderId: "100658301742",
  appId: "1:100658301742:web:1dfaa150a468b0232cc8bf"
};

const app      = initializeApp(firebaseConfig);
const db       = getFirestore(app);
const auth     = getAuth(app);
const provider = new GoogleAuthProvider();

let unsubTrabalhos = null;
let unsubClientes  = null;

// ── Helpers para coleções do usuário logado ──
function userCol(colName) {
  return collection(db, 'usuarios', window._uid, colName);
}
function userDoc(colName, id) {
  return doc(db, 'usuarios', window._uid, colName, id);
}

// ── Expõe ao escopo global ──
window._db        = db;
window._auth      = auth;
window._signOut   = () => signOut(auth);
window._setDoc    = setDoc;
window._deleteDoc = deleteDoc;
window._userDoc   = userDoc;

// ── Login Google — qualquer conta ──
window.fazerLogin = async () => {
  try {
    await signInWithPopup(auth, provider);
  } catch(e) {
    document.getElementById('login-error').textContent = 'Erro ao fazer login. Tente novamente.';
  }
};

// ── Observa autenticação ──
onAuthStateChanged(auth, user => {
  // Cancela listeners anteriores se existirem
  if (unsubTrabalhos) { unsubTrabalhos(); unsubTrabalhos = null; }
  if (unsubClientes)  { unsubClientes();  unsubClientes  = null; }
  window._appReady = false;

  if (user) {
    window._uid = user.uid;

    document.getElementById('tela-login').style.display = 'none';
    document.getElementById('app-root').style.display   = 'block';
    document.getElementById('sync-status').textContent  = '🟢 ' + (user.displayName || user.email);
    document.getElementById('sync-status').style.color  = 'var(--green)';
    document.getElementById('btn-logout').style.display = 'flex';

    // Listeners nos dados do usuário específico
    unsubTrabalhos = onSnapshot(userCol('trabalhos'), snap => {
      window.trabalhos = [];
      snap.forEach(d => window.trabalhos.push(d.data()));
      window.trabalhos.sort((a,b) => (b.criadoEm||0) - (a.criadoEm||0));
      if (window._appReady) {
        window.renderDashboard(); window.renderTrabalhos(); window.updateBadges();
      }
    });

    unsubClientes = onSnapshot(userCol('clientes'), snap => {
      window.clientes = [];
      snap.forEach(d => window.clientes.push(d.data()));
      if (window._appReady) {
        window.renderDashboard(); window.renderClientes(); window.updateBadges();
      }
    });

    const unsubPrecos = onSnapshot(userCol('precos'), snap => {
      window.precos = [];
      snap.forEach(d => window.precos.push(d.data()));
      window.precos.sort((a,b) => a.nome.localeCompare(b.nome));
      if (window._appReady) {
        window.renderPrecos(); window.updateBadges();
      }
    });

    window._appReady = true;
    window.renderDashboard();
    window.updateBadges();

  } else {
    window._uid = null;
    window.trabalhos = [];
    window.clientes  = [];
    document.getElementById('tela-login').style.display = 'flex';
    document.getElementById('app-root').style.display   = 'none';
    document.getElementById('btn-logout').style.display = 'none';
  }
});
</script>
<style>

    --accent-analog-dim: rgba(244,161,52,0.12);
    --accent-digital-dim: rgba(59,158,255,0.12);
    --text: #e8e8f0;

  }

  /* GRID NOISE TEXTURE */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  /* ── HEADER ── */
  header {

    backdrop-filter: blur(16px);
    border-bottom: 1px solid var(--border);
    padding: 0 32px;
    display: flex; align-items: center; justify-content: space-between;
    height: 60px;
  }

  .logo {
    font-size: 17px; font-weight: 800; letter-spacing: 0.08em;
    color: var(--text);
    display: flex; align-items: center; gap: 10px;
    font-family: var(--font-display);
  }
  .logo span { color: var(--accent-analog); }
  .logo-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--accent-analog);
    box-shadow: 0 0 10px var(--accent-analog);
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%,100% { opacity: 1; } 50% { opacity: .3; }
  }

  .header-right {
    display: flex; align-items: center; gap: 16px;
  }

  .btn-backup {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text-dim);
    padding: 7px 14px;
    border-radius: var(--radius);
    font-family: var(--font-body);
    font-weight: 600;
    font-size: 12px;
    cursor: pointer;
    letter-spacing: 0.02em;
    transition: all .2s;
    display: flex; align-items: center; gap: 5px;
  }
  .btn-backup:hover { border-color: var(--text-muted); color: var(--text); background: var(--surface); }
  .btn-backup.importar { color: var(--accent-digital); border-color: rgba(59,158,255,0.3); }
  .btn-backup.importar:hover { background: var(--accent-digital-dim); border-color: var(--accent-digital); }

  .btn-add {
    background: var(--accent-analog);
    color: #000;
    border: none;
    padding: 8px 18px;
    border-radius: var(--radius);
    font-family: var(--font-body);
    font-weight: 700;
    font-size: 13px;
    cursor: pointer;
    letter-spacing: 0.02em;
    transition: all .2s;
    display: flex; align-items: center; gap: 6px;
  }
  .btn-add:hover { opacity: .85; transform: translateY(-1px); }

  /* ── NAV TABS ── */
  nav {
    display: flex; gap: 4px;
    padding: 16px 32px 0;
    border-bottom: 1px solid var(--border);
    position: relative; z-index: 1;
  }
  .tab {
    padding: 10px 20px;
    font-size: 13px; font-weight: 600; letter-spacing: 0.02em;
    color: var(--text-muted);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all .2s;
    display: flex; align-items: center; gap: 7px;
    font-family: var(--font-body);
  }
  .tab:hover { color: var(--text-dim); }
  .tab.active { color: var(--text); border-color: var(--accent-analog); }
  .tab-badge {
    background: var(--surface2);
    padding: 2px 7px; border-radius: 20px;
    font-size: 11px; color: var(--text-muted);
  }
  .tab.active .tab-badge { background: var(--accent-analog-dim); color: var(--accent-analog); }

  /* ── MAIN ── */
  main {
    padding: 28px 32px;
    position: relative; z-index: 1;
    max-width: 1400px;
  }

  /* ── PAGES ── */
  .page { display: none; }
  .page.active { display: block; animation: fadeIn .2s ease; }
  @keyframes fadeIn { from { opacity:0; transform: translateY(6px); } to { opacity:1; transform:none; } }

  /* ── DASHBOARD CARDS ── */
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 16px;
    margin-bottom: 28px;
  }

  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    position: relative; overflow: hidden;
    transition: border-color .2s;
  }
  .stat-card:hover { border-color: var(--text-muted); }
  .stat-card::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0; height: 2px;
  }
  .stat-card.analog::before { background: var(--accent-analog); }
  .stat-card.digital::before { background: var(--accent-digital); }
  .stat-card.total::before { background: linear-gradient(90deg, var(--accent-analog), var(--accent-digital)); }
  .stat-card.clients::before { background: var(--green); }

  .stat-label {
    font-size: 11px; font-weight: 700; letter-spacing: 0.1em;
    color: var(--text-muted); text-transform: uppercase;
    margin-bottom: 8px;
    display: flex; align-items: center; gap: 6px;
  }
  .stat-dot { width: 6px; height: 6px; border-radius: 50%; }
  .stat-dot.analog { background: var(--accent-analog); }
  .stat-dot.digital { background: var(--accent-digital); }
  .stat-dot.total { background: var(--green); }
  .stat-dot.clients { background: var(--green); }
