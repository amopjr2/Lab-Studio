<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0e0e10">
<title>LAB — Sistema de Gestão</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,400&family=Syne:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-app.js";
import { getFirestore, collection, doc, setDoc, deleteDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-firestore.js";
import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyCdxx2EMbsfMVbaL6J9LKN3paFfmESeY6o",
  authDomain: "lab-studio-626f8.firebaseapp.com",
  projectId: "lab-studio-626f8",
  storageBucket: "lab-studio-626f8.firebasestorage.app",
  messagingSenderId: "100658301742",
  appId: "1:100658301742:web:1dfaa150a468b0232cc8bf"
};

const app      = initializeApp(firebaseConfig);
const db       = getFirestore(app);
const auth     = getAuth(app);
const provider = new GoogleAuthProvider();

// Helpers
function userCol(colName) { return collection(db, 'usuarios', window._uid, colName); }
function userDoc(colName, id) { return doc(db, 'usuarios', window._uid, colName, id); }

window.fazerLogin = async () => {
  try { await signInWithPopup(auth, provider); } catch(e) { document.getElementById('login-error').textContent = 'Erro ao fazer login.'; }
};

onAuthStateChanged(auth, user => {
  if (user) {
    window._uid = user.uid;
    document.getElementById('tela-login').style.display = 'none';
    document.getElementById('app-root').style.display = 'block';
    
    // Listeners
    onSnapshot(userCol('trabalhos'), snap => {
      window.trabalhos = []; snap.forEach(d => window.trabalhos.push(d.data()));
      window.trabalhos.sort((a,b) => (b.criadoEm||0) - (a.criadoEm||0));
      refreshUI();
    });
    onSnapshot(userCol('clientes'), snap => {
      window.clientes = []; snap.forEach(d => window.clientes.push(d.data()));
      refreshUI();
    });
    onSnapshot(userCol('servicos'), snap => {
      window.servicos = []; snap.forEach(d => window.servicos.push(d.data()));
      refreshUI();
    });
  } else {
    document.getElementById('tela-login').style.display = 'flex';
    document.getElementById('app-root').style.display = 'none';
  }
});

function refreshUI() {
    window.renderDashboard?.(); window.renderTrabalhos?.(); 
    window.renderClientes?.(); window.renderServicos?.(); window.updateBadges?.();
}

// Globais para as funções do sistema
window._setDoc = setDoc; window._deleteDoc = deleteDoc; window._userDoc = userDoc; window._signOut = () => signOut(auth);
</script>

<style>
  :root {
    --bg: #0e0e10;
    --surface: #17171b;
    --surface2: #1e1e24;
    --border: #2a2a35;
    --accent-analog: #f4a134;
    --accent-digital: #3b9eff;
    --accent-analog-dim: rgba(244,161,52,0.12);
    --accent-digital-dim: rgba(59,158,255,0.12);
    --text: #e8e8f0;
    --text-muted: #6b6b80;
    --text-dim: #9898b0;
    --green: #4ade80;
    --red: #f87171;
    --radius: 10px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Syne', sans-serif; min-height: 100vh; overflow-x: hidden; }
  
  /* GRID NOISE TEXTURE - RESTAURADO */
  body::before {
    content: ''; position: fixed; inset: 0;
    background-image: linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px);
    background-size: 40px 40px; pointer-events: none; z-index: 0;
  }

  /* HEADER OTIMIZADO MOBILE */
  header {
    position: sticky; top: 0; z-index: 100;
    background: rgba(14,14,16,0.85); backdrop-filter: blur(16px);
    border-bottom: 1px solid var(--border);
    padding: 0 32px; display: flex; align-items: center; justify-content: space-between; height: 65px;
  }

  .logo { font-size: 18px; font-weight: 800; letter-spacing: 0.12em; display: flex; align-items: center; gap: 10px; }
  .logo span { color: var(--accent-analog); }
  .logo-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent-analog); box-shadow: 0 0 10px var(--accent-analog); animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: .3; } }

  .header-right { display: flex; align-items: center; gap: 12px; }

  /* BOTÕES HEADER */
  .btn-backup {
    background: var(--surface2); border: 1px solid var(--border); color: var(--text-dim);
    padding: 8px 14px; border-radius: var(--radius); font-weight: 600; font-size: 12px; cursor: pointer;
    display: flex; align-items: center; gap: 6px; transition: all .2s;
  }
  .btn-add {
    background: var(--accent-analog); color: #000; border: none; padding: 10px 18px;
    border-radius: var(--radius); font-weight: 700; font-size: 13px; cursor: pointer;
    display: flex; align-items: center; gap: 6px;
  }

  /* NAV */
  nav { display: flex; gap: 4px; padding: 16px 32px 0; border-bottom: 1px solid var(--border); position: relative; z-index: 1; overflow-x: auto; }
  .tab { padding: 10px 20px; font-size: 13px; font-weight: 600; color: var(--text-muted); cursor: pointer; border-bottom: 2px solid transparent; white-space: nowrap; }
  .tab.active { color: var(--text); border-color: var(--accent-analog); }

  main { padding: 28px 32px; position: relative; z-index: 1; max-width: 1400px; margin: 0 auto; }
  .page { display: none; }
  .page.active { display: block; animation: fadeIn .2s ease; }

  /* CARDS */
  .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 28px; }
  .stat-card { background: var(--surface); border: 1px solid var(--border); padding: 20px; border-radius: var(--radius); border-top: 2px solid var(--accent-analog); }
  .stat-card.digital { border-top-color: var(--accent-digital); }
  .stat-value { font-size: 28px; font-weight: 800; font-family: 'DM Mono', monospace; margin-top: 8px; }

  /* TABELAS */
  .table-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; min-width: 700px; }
  th { padding: 14px 16px; font-size: 11px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; text-align: left; border-bottom: 1px solid var(--border); }
  td { padding: 14px 16px; border-bottom: 1px solid rgba(42,42,53,0.5); font-size: 14px; }

  /* MODAL MOBILE-FRIENDLY */
  .modal-overlay {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8);
    backdrop-filter: blur(6px); z-index: 1000; align-items: center; justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 16px; padding: 28px; width: 520px; max-width: 95vw;
    max-height: 90vh; overflow-y: auto; position: relative;
  }

  .form-group { display: flex; flex-direction: column; gap: 6px; margin-bottom: 16px; }
  label { font-size: 11px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; }
  input, select, textarea {
    background: var(--surface2); border: 1px solid var(--border); color: #fff;
    padding: 12px; border-radius: 8px; font-family: 'DM Mono', monospace; font-size: 14px; outline: none; width: 100%;
  }

  .btn-save { width: 100%; padding: 14px; background: var(--accent-analog); color: #000; border: none; border-radius: 10px; font-weight: 800; cursor: pointer; font-family: 'Syne'; }
  .action-btn { background: none; border: 1px solid var(--border); color: var(--text-muted); cursor: pointer; padding: 6px 10px; border-radius: 6px; font-size: 12px; margin-right: 4px; }
  .action-btn.pdf-btn { color: var(--accent-analog); border-color: rgba(244,161,52,0.3); }

  /* RESPONSIVIDADE MOBILE */
  @media (max-width: 768px) {
    header { padding: 0 16px; height: 60px; }
    .header-right span, .btn-backup span { display: none; }
    .logo { font-size: 14px; }
    main { padding: 16px; }
    nav { padding: 10px 16px 0; }
    .modal-overlay { align-items: flex-end; }
    .modal { border-radius: 20px 20px 0 0; width: 100%; max-width: 100%; padding: 20px; }
  }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: none; } }
</style>
</head>
<body>

<div id="tela-login" style="display:flex;position:fixed;inset:0;z-index:9999;background:var(--bg);align-items:center;justify-content:center;flex-direction:column;gap:20px;">
    <div style="font-size:32px;font-weight:800;letter-spacing:0.1em">LAB<span style="color:var(--accent-analog)">.</span>STUDIO</div>
    <button onclick="fazerLogin()" style="padding:14px 28px;border-radius:10px;border:none;background:white;color:black;font-weight:700;cursor:pointer;font-family:'Syne'">Entrar com Google</button>
    <div id="login-error" style="color:var(--red);font-size:13px"></div>
</div>

<div id="app-root" style="display:none">
  <header>
    <div class="logo"><div class="logo-dot"></div>LAB<span>.</span>STUDIO</div>
    <div class="header-right">
      <span id="sync-status" style="font-size:11px;color:var(--text-muted);font-family:'DM Mono'">⏳...</span>
      <button class="btn-backup" onclick="exportarBackup()"><span>Backup</span> ⬇️</button>
      <label class="btn-backup">
        <span>Importar</span> ⬆️ <input type="file" onchange="importarBackup(event)" style="display:none">
      </label>
      <button class="btn-add" onclick="openModal()">+ <span>Novo Trabalho</span></button>
    </div>
  </header>

  <nav>
    <div class="tab active" onclick="switchTab('dashboard')">◈ Dashboard</div>
    <div class="tab" onclick="switchTab('trabalhos')">⊞ Trabalhos <span id="badge-trabalhos"></span></div>
    <div class="tab" onclick="switchTab('clientes')">◎ Clientes <span id="badge-clientes"></span></div>
    <div class="tab" onclick="switchTab('servicos')">🏷️ Catálogo de Preços</div>
  </nav>

  <main>
    <!-- DASHBOARD -->
    <div class="page active" id="page-dashboard">
        <div class="stats-grid">
            <div class="stat-card">
                <div style="font-size:11px; font-weight:700; color:var(--text-muted)">ANALÓGICO</div>
                <div class="stat-value" id="dash-analog">R$ 0,00</div>
            </div>
            <div class="stat-card digital">
                <div style="font-size:11px; font-weight:700; color:var(--text-muted)">DIGITAL</div>
                <div class="stat-value" id="dash-digital">R$ 0,00</div>
            </div>
            <div class="stat-card" style="border-top-color: var(--green)">
                <div style="font-size:11px; font-weight:700; color:var(--text-muted)">TOTAL GERAL</div>
                <div class="stat-value" id="dash-total">R$ 0,00</div>
            </div>
        </div>
        <h3 style="margin-bottom:15px; font-size:16px">Trabalhos Recentes</h3>
        <div id="recent-list"></div>
    </div>

    <!-- TRABALHOS -->
    <div class="page" id="page-trabalhos">
        <input type="text" id="search-trabalhos" placeholder="Filtrar trabalhos..." oninput="renderTrabalhos()" style="max-width:400px; margin-bottom:20px">
        <div class="table-wrap">
            <table>
                <thead><tr><th>Cliente</th><th>Trabalho</th><th>Tipo</th><th>Valor</th><th>Ações</th></tr></thead>
                <tbody id="tbody-trabalhos"></tbody>
            </table>
        </div>
    </div>

    <!-- CLIENTES -->
    <div class="page" id="page-clientes">
        <button class="btn-add" onclick="openClienteModal()" style="margin-bottom:20px">+ Novo Cliente</button>
        <div class="table-wrap">
            <table>
                <thead><tr><th>Nome</th><th>Contato</th><th>Ações</th></tr></thead>
                <tbody id="tbody-clientes"></tbody>
            </table>
        </div>
    </div>

    <!-- CATALOGO -->
    <div class="page" id="page-servicos">
        <div style="background:var(--surface); padding:24px; border-radius:var(--radius); border:1px solid var(--border); margin-bottom:24px">
            <h4 style="margin-bottom:15px">Novo Item no Catálogo</h4>
            <div style="display:grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap:15px">
                <div class="form-group"><label>Nome do Serviço</label><input type="text" id="s-nome" placeholder="Ex: Prótese Acrílica"></div>
                <div class="form-group"><label>Preço Base (R$)</label><input type="number" id="s-preco" step="0.01"></div>
                <div class="form-group">
                    <label>Tipo</label>
                    <select id="s-tipo"><option value="analog">Analógico</option><option value="digital">Digital</option></select>
                </div>
            </div>
            <button class="btn-save" onclick="saveServico()" style="margin-top:20px">Salvar no Catálogo</button>
        </div>
        <div class="table-wrap">
            <table>
                <thead><tr><th>Serviço</th><th>Preço</th><th>Ações</th></tr></thead>
                <tbody id="tbody-servicos"></tbody>
            </table>
        </div>
    </div>
  </main>

  <!-- MODAL TRABALHO -->
  <div class="modal-overlay" id="modal-trabalho">
    <div class="modal">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px">
            <h3>🖌️ Trabalho</h3>
            <button onclick="closeModal()" style="background:none; border:none; color:var(--text-muted); cursor:pointer; font-size:20px">✕</button>
        </div>
        <input type="hidden" id="edit-id">
        <div class="form-group">
            <label>Usar Catálogo de Preços</label>
            <select id="f-catalogo" onchange="applyCatalogo()"><option value="">— Selecionar —</option></select>
        </div>
        <div class="form-group"><label>Nome do Trabalho</label><input type="text" id="f-nome"></div>
        <div class="form-group"><label>Cliente</label><select id="f-cliente"></select></div>
        <div class="form-group"><label>Valor (R$)</label><input type="number" id="f-valor" step="0.01"></div>
        <div class="form-group">
            <label>Tipo</label>
            <select id="f-tipo"><option value="analog">Analógico</option><option value="digital">Digital</option></select>
        </div>
        <button class="btn-save" onclick="saveTrabalho()">Salvar</button>
    </div>
  </div>

  <!-- MODAL CLIENTE -->
  <div class="modal-overlay" id="modal-cliente">
    <div class="modal">
        <h3>👤 Cliente</h3>
        <div class="form-group" style="margin-top:15px"><label>Nome Completo</label><input type="text" id="c-nome"></div>
        <div class="form-group"><label>Contato</label><input type="text" id="c-contato"></div>
        <button class="btn-save" onclick="saveCliente()">Salvar</button>
        <button onclick="closeClienteModal()" style="width:100%; background:none; border:none; color:var(--text-muted); margin-top:15px; cursor:pointer">Cancelar</button>
    </div>
  </div>
</div>

<script>
// Logica do Sistema
window.trabalhos = []; window.clientes = []; window.servicos = [];

const fmt = (n) => Number(n).toLocaleString('pt-BR', {minimumFractionDigits: 2});

function switchTab(tab) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.getElementById('page-' + tab).classList.add('active');
    event.currentTarget.classList.add('active');
}

// CATALOGO
async function saveServico() {
    const nome = document.getElementById('s-nome').value;
    const preco = parseFloat(document.getElementById('s-preco').value) || 0;
    const tipo = document.getElementById('s-tipo').value;
    if(!nome) return alert('Nome necessário');
    const id = Date.now().toString();
    await window._setDoc(window._userDoc('servicos', id), {id, nome, preco, tipo});
    document.getElementById('s-nome').value = ''; document.getElementById('s-preco').value = '';
}

function renderServicos() {
    const tbody = document.getElementById('tbody-servicos');
    tbody.innerHTML = window.servicos.map(s => `
        <tr>
            <td>${s.nome} <br> <small style="color:var(--text-dim)">${s.tipo}</small></td>
            <td>R$ ${fmt(s.preco)}</td>
            <td><button class="action-btn" onclick="deleteServico('${s.id}')">✕</button></td>
        </tr>
    `).join('');
    const fCat = document.getElementById('f-catalogo');
    fCat.innerHTML = '<option value="">— Selecionar do Catálogo —</option>' + window.servicos.map(s => `<option value="${s.id}">${s.nome}</option>`).join('');
}

async function deleteServico(id) { if(confirm('Remover do catálogo?')) await window._deleteDoc(window._userDoc('servicos', id)); }

function applyCatalogo() {
    const sId = document.getElementById('f-catalogo').value;
    const s = window.servicos.find(x => x.id === sId);
    if(s) {
        document.getElementById('f-nome').value = s.nome;
        document.getElementById('f-valor').value = s.preco;
        document.getElementById('f-tipo').value = s.tipo;
    }
}

// CLIENTES
function openClienteModal() { document.getElementById('modal-cliente').classList.add('open'); }
function closeClienteModal() { document.getElementById('modal-cliente').classList.remove('open'); }
async function saveCliente() {
    const nome = document.getElementById('c-nome').value;
    if(!nome) return;
    const id = Date.now().toString();
    await window._setDoc(window._userDoc('clientes', id), {id, nome, contato: document.getElementById('c-contato').value});
    closeClienteModal();
}
function renderClientes() {
    const tbody = document.getElementById('tbody-clientes');
    tbody.innerHTML = window.clientes.map(c => `
        <tr>
            <td><b>${c.nome}</b></td>
            <td>${c.contato || '-'}</td>
            <td>
                <button class="action-btn pdf-btn" onclick="exportClientePDF('${c.id}')">PDF</button>
                <button class="action-btn" onclick="deleteCliente('${c.id}')">✕</button>
            </td>
        </tr>
    `).join('');
}
async function deleteCliente(id) { if(confirm('Remover cliente?')) await window._deleteDoc(window._userDoc('clientes', id)); }

// TRABALHOS
function openModal(id = null) {
    document.getElementById('modal-trabalho').classList.add('open');
    const cliSel = document.getElementById('f-cliente');
    cliSel.innerHTML = window.clientes.map(c => `<option value="${c.id}">${c.nome}</option>`).join('');
    if(!id) {
        document.getElementById('edit-id').value = ''; document.getElementById('f-nome').value = ''; document.getElementById('f-valor').value = '';
    }
}
function closeModal() { document.getElementById('modal-trabalho').classList.remove('open'); }
async function saveTrabalho() {
    const id = document.getElementById('edit-id').value || Date.now().toString();
    await window._setDoc(window._userDoc('trabalhos', id), {
        id, nome: document.getElementById('f-nome').value,
        clienteId: document.getElementById('f-cliente').value,
        valor: parseFloat(document.getElementById('f-valor').value) || 0,
        tipo: document.getElementById('f-tipo').value,
        criadoEm: Date.now()
    });
    closeModal();
}

function renderTrabalhos() {
    const busca = document.getElementById('search-trabalhos').value.toLowerCase();
    const tbody = document.getElementById('tbody-trabalhos');
    tbody.innerHTML = window.trabalhos.filter(t => t.nome.toLowerCase().includes(busca)).map(t => {
        const c = window.clientes.find(x => x.id === t.clienteId);
        return `<tr>
            <td>${c ? c.nome : '?'}</td>
            <td>${t.nome}</td>
            <td><span style="color:${t.tipo==='digital'?'var(--accent-digital)':'var(--accent-analog)'}">${t.tipo}</span></td>
            <td><b>R$ ${fmt(t.valor)}</b></td>
            <td><button class="action-btn" onclick="deleteTrabalho('${t.id}')">✕</button></td>
        </tr>`;
    }).join('');
}
async function deleteTrabalho(id) { if(confirm('Remover trabalho?')) await window._deleteDoc(window._userDoc('trabalhos', id)); }

// DASHBOARD
function renderDashboard() {
    const totA = window.trabalhos.filter(t => t.tipo === 'analog').reduce((a, b) => a + b.valor, 0);
    const totD = window.trabalhos.filter(t => t.tipo === 'digital').reduce((a, b) => a + b.valor, 0);
    document.getElementById('dash-analog').textContent = 'R$ ' + fmt(totA);
    document.getElementById('dash-digital').textContent = 'R$ ' + fmt(totD);
    document.getElementById('dash-total').textContent = 'R$ ' + fmt(totA + totD);
    const recentes = window.trabalhos.slice(0, 5);
    document.getElementById('recent-list').innerHTML = recentes.map(t => `
        <div style="background:var(--surface); padding:15px; border-radius:10px; margin-bottom:10px; border:1px solid var(--border); display:flex; justify-content:space-between">
            <span>${t.nome}</span> <b>R$ ${fmt(t.valor)}</b>
        </div>
    `).join('');
}

function updateBadges() {
    document.getElementById('badge-trabalhos').textContent = `(${window.trabalhos.length})`;
    document.getElementById('badge-clientes').textContent = `(${window.clientes.length})`;
}

// EXPORT PDF - ESTÉTICA ORIGINAL RESTAURADA
window.exportClientePDF = function(clienteId) {
  const { jsPDF } = window.jspdf;
  const c = window.clientes.find(x => x.id === clienteId);
  const works = window.trabalhos.filter(t => t.clienteId === clienteId);
  
  const doc = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });
  const W = 210; const margin = 18;

  // Header Band
  doc.setFillColor(14, 14, 16); doc.rect(0, 0, W, 42, 'F');
  doc.setFont('helvetica', 'bold'); doc.setFontSize(18); doc.setTextColor(244, 161, 52); doc.text('LAB.STUDIO', margin, 16);
  doc.setFontSize(9); doc.setTextColor(152, 152, 176); doc.text('Relatório de Cliente', margin, 23);
  doc.setFontSize(14); doc.setTextColor(232, 232, 240); doc.text(c.nome, margin, 34);

  let infoY = 50;
  doc.setFillColor(23, 23, 27); doc.roundedRect(margin, infoY - 6, W - margin*2, 20, 3, 3, 'FD');
  doc.setFontSize(8); doc.setTextColor(107, 107, 128); doc.text('CONTATO', margin + 6, infoY);
  doc.setFont('helvetica', 'bold'); doc.setFontSize(10); doc.setTextColor(232, 232, 240); doc.text(c.contato || '—', margin + 6, infoY + 8);

  // Totals Boxes
  infoY += 25;
  const totAnalog = works.filter(t=>t.tipo==='analog').reduce((a,b)=>a+b.valor,0);
  const totDigital = works.filter(t=>t.tipo==='digital').reduce((a,b)=>a+b.valor,0);
  
  doc.setFillColor(30, 24, 14); doc.roundedRect(margin, infoY, 55, 20, 2, 2, 'F');
  doc.setTextColor(244, 161, 52); doc.setFontSize(7); doc.text('ANALÓGICO', margin + 4, infoY + 6);
  doc.setFontSize(10); doc.text('R$ '+fmt(totAnalog), margin + 4, infoY + 14);

  doc.setFillColor(14, 18, 28); doc.roundedRect(margin + 60, infoY, 55, 20, 2, 2, 'F');
  doc.setTextColor(59, 158, 255); doc.setFontSize(7); doc.text('DIGITAL', margin + 64, infoY + 6);
  doc.setFontSize(10); doc.text('R$ '+fmt(totDigital), margin + 64, infoY + 14);

  // Table
  doc.autoTable({
    startY: infoY + 30,
    head: [['Serviço', 'Tipo', 'Valor']],
    body: works.map(t => [t.nome, t.tipo, 'R$ '+fmt(t.valor)]),
    theme: 'grid',
    headStyles: { fillColor: [30, 30, 36], textColor: [152, 152, 176] },
    styles: { fillColor: [23, 23, 27], textColor: [232, 232, 240], lineColor: [42, 42, 53] }
  });

  doc.save(`Relatorio_${c.nome}.pdf`);
}

// Backup
window.exportarBackup = function() {
    const dados = JSON.stringify({ trabalhos: window.trabalhos, clientes: window.clientes, servicos: window.servicos });
    const blob = new Blob([dados], { type: 'application/json' });
    const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
    a.download = `backup_lab_${new Date().toISOString().slice(0,10)}.json`; a.click();
}

window.importarBackup = function(event) {
    const reader = new FileReader();
    reader.onload = async (e) => {
        const d = JSON.parse(e.target.result);
        if(confirm('Importar dados?')) {
            if(d.clientes) for(let c of d.clientes) await window._setDoc(window._userDoc('clientes', c.id), c);
            if(d.servicos) for(let s of d.servicos) await window._setDoc(window._userDoc('servicos', s.id), s);
            if(d.trabalhos) for(let t of d.trabalhos) await window._setDoc(window._userDoc('trabalhos', t.id), t);
            alert('Sucesso!');
        }
    };
    reader.readAsText(event.target.files[0]);
}

window.renderDashboard = renderDashboard; window.renderTrabalhos = renderTrabalhos;
window.renderClientes = renderClientes; window.renderServicos = renderServicos;
window.updateBadges = updateBadges;
</script>
