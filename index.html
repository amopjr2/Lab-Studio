<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0e0e10">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="LAB.STUDIO">
<title>LAB — Sistema de Gestão</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,400&family=Syne:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-app.js";
import { getFirestore, collection, doc, setDoc, deleteDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-firestore.js";
import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyCdxx2EMbsfMVbaL6J9LKN3paFfmESeY6o",
  authDomain: "lab-studio-626f8.firebaseapp.com",
  projectId: "lab-studio-626f8",
  storageBucket: "lab-studio-626f8.firebasestorage.app",
  messagingSenderId: "100658301742",
  appId: "1:100658301742:web:1dfaa150a468b0232cc8bf"
};

const app      = initializeApp(firebaseConfig);
const db       = getFirestore(app);
const auth     = getAuth(app);
const provider = new GoogleAuthProvider();

let unsubTrabalhos = null, unsubClientes = null, unsubServicos = null;

function userCol(colName) { return collection(db, 'usuarios', window._uid, colName); }
function userDoc(colName, id) { return doc(db, 'usuarios', window._uid, colName, id); }

window.fazerLogin = async () => {
  try { await signInWithPopup(auth, provider); } catch(e) { document.getElementById('login-error').textContent = 'Erro ao fazer login.'; }
};

onAuthStateChanged(auth, user => {
  if (unsubTrabalhos) unsubTrabalhos(); if (unsubClientes) unsubClientes(); if (unsubServicos) unsubServicos();
  if (user) {
    window._uid = user.uid;
    document.getElementById('tela-login').style.display = 'none';
    document.getElementById('app-root').style.display = 'block';
    document.getElementById('sync-status').textContent = '🟢 ' + (user.displayName || 'Online');

    unsubTrabalhos = onSnapshot(userCol('trabalhos'), snap => {
      window.trabalhos = []; snap.forEach(d => window.trabalhos.push(d.data()));
      window.trabalhos.sort((a,b) => (b.criadoEm||0) - (a.criadoEm||0));
      refreshUI();
    });
    unsubClientes = onSnapshot(userCol('clientes'), snap => {
      window.clientes = []; snap.forEach(d => window.clientes.push(d.data()));
      refreshUI();
    });
    unsubServicos = onSnapshot(userCol('servicos'), snap => {
      window.servicos = []; snap.forEach(d => window.servicos.push(d.data()));
      refreshUI();
    });
  } else {
    document.getElementById('tela-login').style.display = 'flex';
    document.getElementById('app-root').style.display = 'none';
  }
});

function refreshUI() {
    window.renderDashboard?.(); window.renderTrabalhos?.(); 
    window.renderClientes?.(); window.renderServicos?.(); window.updateBadges?.();
}

window._signOut = () => signOut(auth);
window._setDoc = setDoc; window._deleteDoc = deleteDoc; window._userDoc = userDoc;
</script>
<style>
  :root {
    --bg: #0e0e10;
    --surface: #17171b;
    --surface2: #1e1e24;
    --border: #2a2a35;
    --accent-analog: #f4a134;
    --accent-digital: #3b9eff;
    --accent-analog-dim: rgba(244,161,52,0.12);
    --accent-digital-dim: rgba(59,158,255,0.12);
    --text: #e8e8f0;
    --text-muted: #6b6b80;
    --text-dim: #9898b0;
    --green: #4ade80;
    --red: #f87171;
    --radius: 10px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* TEXTURA DE FUNDO */
  body::before {
    content: ''; position: fixed; inset: 0;
    background-image: linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px);
    background-size: 40px 40px; pointer-events: none; z-index: 0;
  }

  /* HEADER */
  header {
    position: sticky; top: 0; z-index: 100;
    background: rgba(14,14,16,0.85); backdrop-filter: blur(16px);
    border-bottom: 1px solid var(--border);
    padding: 0 32px; display: flex; align-items: center; justify-content: space-between; height: 65px;
  }

  .logo { font-size: 18px; font-weight: 800; letter-spacing: 0.12em; display: flex; align-items: center; gap: 10px; }
  .logo span { color: var(--accent-analog); }

  .header-right { display: flex; align-items: center; gap: 12px; }

  .btn-backup {
    background: var(--surface2); border: 1px solid var(--border); color: var(--text-dim);
    padding: 8px 14px; border-radius: var(--radius); font-weight: 600; font-size: 12px; cursor: pointer;
    display: flex; align-items: center; gap: 6px; transition: all .2s;
  }
  .btn-add {
    background: var(--accent-analog); color: #000; border: none; padding: 10px 18px;
    border-radius: var(--radius); font-weight: 700; font-size: 13px; cursor: pointer;
    display: flex; align-items: center; gap: 6px;
  }

  /* NAV */
  nav { display: flex; gap: 4px; padding: 16px 32px 0; border-bottom: 1px solid var(--border); position: relative; z-index: 1; overflow-x: auto; scrollbar-width: none; }
  nav::-webkit-scrollbar { display: none; }
  .tab { padding: 10px 20px; font-size: 13px; font-weight: 600; color: var(--text-muted); cursor: pointer; border-bottom: 2px solid transparent; white-space: nowrap; }
  .tab.active { color: var(--text); border-color: var(--accent-analog); }

  main { padding: 28px 32px; position: relative; z-index: 1; max-width: 1400px; margin: 0 auto; }
  .page { display: none; }
  .page.active { display: block; animation: fadeIn .2s ease; }

  /* TABELA */
  .table-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow-x: auto; margin-top: 15px; }
  table { width: 100%; border-collapse: collapse; min-width: 600px; }
  th { padding: 14px 16px; font-size: 11px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; text-align: left; border-bottom: 1px solid var(--border); }
  td { padding: 14px 16px; border-bottom: 1px solid rgba(42,42,53,0.5); font-size: 14px; }

  /* MODAL - DESIGN HIBRIDO (CENTRO PC / GAVETA CELULAR) */
  .modal-overlay {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8);
    backdrop-filter: blur(6px); z-index: 1000;
    align-items: center; justify-content: center; /* Desktop default */
  }
  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 16px; padding: 28px; width: 520px; max-width: 95vw;
    max-height: 90vh; overflow-y: auto; position: relative;
    animation: modalIn .25s cubic-bezier(.34,1.56,.64,1);
  }

  .form-group { display: flex; flex-direction: column; gap: 6px; margin-bottom: 16px; }
  label { font-size: 11px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; }
  input, select, textarea {
    background: var(--surface2); border: 1px solid var(--border); color: #fff;
    padding: 12px; border-radius: 8px; font-family: 'DM Mono', monospace; font-size: 14px; outline: none;
  }
  input:focus { border-color: var(--accent-analog); }

  /* AJUSTES MOBILE */
  @media (max-width: 768px) {
    header { padding: 0 16px; }
    main { padding: 16px; }
    nav { padding: 10px 16px 0; }
    .header-right span, .btn-backup span { display: none; } /* Esconde textos */
    .btn-add { padding: 10px 14px; }
    .modal-overlay { align-items: flex-end; } /* Modal vira gaveta no celular */
    .modal { width: 100%; max-width: 100%; border-radius: 20px 20px 0 0; animation: modalSlideUp 0.3s ease; }
    .stats-grid { grid-template-columns: 1fr 1fr; }
  }

  @keyframes modalIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
  @keyframes modalSlideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

  /* DASHBOARD CARDS */
  .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 24px; }
  .stat-card { background: var(--surface); border: 1px solid var(--border); padding: 20px; border-radius: var(--radius); border-top: 2px solid var(--accent-analog); }
  .stat-value { font-size: 24px; font-weight: 800; font-family: 'DM Mono', monospace; margin-top: 5px; }

  .badge { padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 700; }
  .badge.analog { background: var(--accent-analog-dim); color: var(--accent-analog); }
  .badge.digital { background: var(--accent-digital-dim); color: var(--accent-digital); }
</style>
</head>
<body>

<div id="tela-login" style="display:flex;position:fixed;inset:0;z-index:9999;background:var(--bg);align-items:center;justify-content:center;flex-direction:column;gap:20px;">
    <div style="font-size:32px;font-weight:800;letter-spacing:0.1em">LAB<span style="color:var(--accent-analog)">.</span>STUDIO</div>
    <button onclick="fazerLogin()" style="padding:14px 28px;border-radius:10px;border:none;background:white;color:black;font-weight:700;cursor:pointer;font-family:'Syne'">Entrar com Google</button>
    <div id="login-error" style="color:var(--red);font-size:13px"></div>
</div>

<div id="app-root" style="display:none">
  <header>
    <div class="logo">LAB<span>.</span>STUDIO</div>
    <div class="header-right">
      <span id="sync-status" style="font-size:11px;color:var(--text-muted);font-family:'DM Mono'">⏳...</span>
      <button class="btn-backup" onclick="exportarBackup()"><span>Backup</span> ⬇️</button>
      <label class="btn-backup">
        <span>Importar</span> ⬆️ <input type="file" onchange="importarBackup(event)" style="display:none">
      </label>
      <button class="btn-add" onclick="openModal()">+ <span>Novo Trabalho</span></button>
    </div>
  </header>

  <nav>
    <div class="tab active" onclick="switchTab('dashboard')">◈ Dashboard</div>
    <div class="tab" onclick="switchTab('trabalhos')">⊞ Trabalhos <span id="badge-trabalhos" style="opacity:0.5; font-size:10px"></span></div>
    <div class="tab" onclick="switchTab('clientes')">◎ Clientes <span id="badge-clientes" style="opacity:0.5; font-size:10px"></span></div>
    <div class="tab" onclick="switchTab('servicos')">🏷️ Catálogo de Preços</div>
  </nav>

  <main>
    <!-- DASHBOARD -->
    <div class="page active" id="page-dashboard">
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-label" style="font-size:11px; color:var(--text-muted); font-weight:700">ANALÓGICO</div>
                <div class="stat-value" id="dash-analog">R$ 0,00</div>
            </div>
            <div class="stat-card" style="border-top-color: var(--accent-digital)">
                <div class="stat-label" style="font-size:11px; color:var(--text-muted); font-weight:700">DIGITAL</div>
                <div class="stat-value" id="dash-digital">R$ 0,00</div>
            </div>
            <div class="stat-card" style="border-top-color: var(--green)">
                <div class="stat-label" style="font-size:11px; color:var(--text-muted); font-weight:700">TOTAL GERAL</div>
                <div class="stat-value" id="dash-total">R$ 0,00</div>
            </div>
        </div>
        <h3 style="margin:30px 0 15px; font-size:16px">Trabalhos Recentes</h3>
        <div id="recent-list"></div>
    </div>

    <!-- TRABALHOS -->
    <div class="page" id="page-trabalhos">
        <input type="text" id="search-trabalhos" placeholder="Buscar por cliente ou serviço..." oninput="renderTrabalhos()" style="width:100%; max-width:400px; margin-bottom:20px">
        <div class="table-wrap">
            <table>
                <thead><tr><th>Cliente</th><th>Trabalho</th><th>Tipo</th><th>Valor</th><th>Ações</th></tr></thead>
                <tbody id="tbody-trabalhos"></tbody>
            </table>
        </div>
    </div>

    <!-- CLIENTES -->
    <div class="page" id="page-clientes">
        <button class="btn-add" onclick="openClienteModal()" style="margin-bottom:20px">+ Novo Cliente</button>
        <div class="table-wrap">
            <table>
                <thead><tr><th>Nome</th><th>Contato</th><th>Ações</th></tr></thead>
                <tbody id="tbody-clientes"></tbody>
            </table>
        </div>
    </div>

    <!-- CATALOGO -->
    <div class="page" id="page-servicos">
        <div style="background:var(--surface); padding:24px; border-radius:var(--radius); border:1px solid var(--border); margin-bottom:24px">
            <h4 style="margin-bottom:15px">Adicionar ao Catálogo</h4>
            <div style="display:grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap:12px">
                <div class="form-group"><label>Serviço</label><input type="text" id="s-nome" placeholder="Ex: Prótese Total"></div>
                <div class="form-group"><label>Preço Base</label><input type="number" id="s-preco" step="0.01"></div>
                <div class="form-group">
                    <label>Tipo</label>
                    <select id="s-tipo"><option value
