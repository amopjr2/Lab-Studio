<script>

/* ===== PREÇOS ===== */
window.tabelaPrecos = [];
let unsubPrecos = null;

function renderPrecos() {
  const q = (document.getElementById('search-precos')?.value || '').toLowerCase();
  const tbody = document.getElementById('tbody-precos');
  if (!tbody) return;

  let list = tabelaPrecos.filter(p =>
    !q || p.nome.toLowerCase().includes(q)
  );

  if (!list.length) {
    tbody.innerHTML = `<tr><td colspan="6">Nenhum preço</td></tr>`;
    return;
  }

  tbody.innerHTML = list.map((p,i)=>`
    <tr>
      <td>#${i+1}</td>
      <td>${p.nome}</td>
      <td>${p.tipo}</td>
      <td>R$ ${fmt(p.valor)}</td>
      <td>${p.obs || '-'}</td>
      <td>
        <button onclick="openPrecoModal('${p.id}')">✎</button>
        <button onclick="deletePreco('${p.id}')">✕</button>
      </td>
    </tr>
  `).join('');
}

/* ===== MODAL ===== */
function openPrecoModal(id) {
  const m = document.getElementById('modal-preco');
  m.classList.add('open');

  if (!id) {
    p_id.value = '';
    p_nome.value = '';
    p_valor.value = '';
    p_obs.value = '';
    p_tipo.value = 'analog';
  } else {
    const p = tabelaPrecos.find(x=>x.id===id);
    if (!p) return;

    p_id.value = p.id;
    p_nome.value = p.nome;
    p_valor.value = p.valor;
    p_obs.value = p.obs || '';
    p_tipo.value = p.tipo;
  }
}

function closePrecoModal(){
  document.getElementById('modal-preco').classList.remove('open');
}

/* ===== SAVE ===== */
async function savePreco(){
  const obj = {
    id: p_id.value || uid(),
    nome: p_nome.value.trim(),
    valor: parseFloat(p_valor.value)||0,
    tipo: p_tipo.value,
    obs: p_obs.value.trim()
  };

  if(!obj.nome){
    alert('Nome obrigatório');
    return;
  }

  await _setDoc(_userDoc('precos', obj.id), obj);
  closePrecoModal();
}

/* ===== DELETE ===== */
async function deletePreco(id){
  if(!confirm('Excluir preço?')) return;
  await _deleteDoc(_userDoc('precos', id));
}

/* ===== SELECT AUTO ===== */
function applyPreco(){
  const id = document.getElementById('f-preco').value;
  const p = tabelaPrecos.find(x=>x.id===id);
  if(p){
    document.getElementById('f-valor').value = p.valor;
  }
}

/* ===== INJETAR SELECT NO MODAL ===== */
function injectPrecoSelect(){
  const target = document.getElementById('grupo-valor-label');
  if (!target || document.getElementById('f-preco')) return;

  const div = document.createElement('div');
  div.className = 'form-group full';
  div.innerHTML = `
    <label>Tipo de Serviço</label>
    <select id="f-preco" onchange="applyPreco()">
      <option value="">Manual</option>
    </select>
  `;

  target.parentNode.insertBefore(div, target);
}

/* ===== PREENCHER SELECT ===== */
function fillPrecoSelect(){
  const sel = document.getElementById('f-preco');
  if (!sel) return;

  sel.innerHTML = '<option value="">Manual</option>';
  tabelaPrecos.forEach(p=>{
    sel.innerHTML += `<option value="${p.id}">${p.nome} - R$ ${fmt(p.valor)}</option>`;
  });
}

/* ===== HOOK NO MODAL ===== */
const oldOpenModal = window.openModal;
window.openModal = function(id){
  oldOpenModal(id);
  injectPrecoSelect();
  fillPrecoSelect();
};

/* ===== FIREBASE LISTENER ===== */
const oldAuth = window.onAuthStateChanged;
window.onAuthStateChanged = function(auth, callback){
  oldAuth(auth, function(user){

    if (unsubPrecos) { unsubPrecos(); unsubPrecos = null; }

    if(user){
      unsubPrecos = onSnapshot(userCol('precos'), snap=>{
        tabelaPrecos = [];
        snap.forEach(d=>tabelaPrecos.push(d.data()));

        renderPrecos();
        updateBadges();
      });
    }

    callback(user);
  });
};

/* ===== BADGE ===== */
const oldUpdateBadges = window.updateBadges;
window.updateBadges = function(){
  oldUpdateBadges();
  const el = document.getElementById('badge-precos');
  if(el) el.textContent = tabelaPrecos.length;
};

</script>
